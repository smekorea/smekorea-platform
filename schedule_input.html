<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SME CALENDAR · 일정 등록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0ece4; --surface:#fff; --border:#ddd5c8; --border2:#b8a898;
    --accent:#c8001e; --accent2:#1a56db; --text:#1a1612; --muted:#8a7a6a; --locked:#b8aaa0;
    --shadow:0 2px 12px rgba(80,55,30,0.1);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;z-index:0;
    background-image:radial-gradient(ellipse 70% 50% at 5% 0%,rgba(200,0,30,0.05) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 95% 100%,rgba(26,86,219,0.04) 0%,transparent 55%);pointer-events:none;}

  /* TOPBAR */
  .topbar{position:sticky;top:0;z-index:100;background:#1a1612;
    padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;}
  .topbar-left{display:flex;align-items:center;gap:14px;}
  .home-btn{display:flex;align-items:center;gap:5px;color:rgba(255,255,255,0.5);
    font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;
    text-decoration:none;transition:color .15s;padding:5px 10px;
    border:1px solid rgba(255,255,255,0.12);border-radius:20px;}
  .home-btn:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
  .topbar-divider{width:1px;height:20px;background:rgba(255,255,255,0.12);}
  .topbar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;
    font-size:22px;letter-spacing:-.5px;color:#fff;}
  .topbar-logo .red{color:var(--accent);}
  .topbar-logo .sub{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:4px;
    color:rgba(255,255,255,0.35);font-style:normal;font-weight:400;display:block;margin-top:2px;}
  .topbar-clock{font-family:'Share Tech Mono',monospace;font-size:18px;font-weight:900;
    color:var(--accent);letter-spacing:2px;}

  /* LAYOUT */
  .page-wrap{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:28px 20px 60px;}

  /* 법인 탭 */
  .entity-tabs{display:flex;gap:8px;margin-bottom:20px;}
  .entity-tab{flex:1;padding:12px 6px;background:var(--surface);border:1.5px solid var(--border);
    border-radius:12px;cursor:pointer;text-align:center;transition:all .2s;
    display:flex;flex-direction:column;align-items:center;gap:5px;}
  .entity-tab:hover{border-color:var(--border2);box-shadow:var(--shadow);}
  .entity-tab.active{border-color:var(--accent);background:rgba(200,0,30,0.04);}
  .entity-tab .flag{font-size:20px;line-height:1;}
  .entity-tab .ename{font-size:9px;font-weight:700;font-family:'Share Tech Mono',monospace;
    letter-spacing:1px;color:var(--muted);}
  .entity-tab.active .ename{color:var(--accent);}
  .entity-tab .etime{font-size:11px;font-family:'Share Tech Mono',monospace;
    color:var(--text);font-weight:700;letter-spacing:1px;}

  /* 폼 카드 */
  .form-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
    padding:28px 30px;box-shadow:var(--shadow);margin-bottom:16px;}
  .mode-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
  .mode-label{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
  .mode-badge{font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;
    background:rgba(200,0,30,0.1);color:var(--accent);border:1px solid rgba(200,0,30,0.2);
    font-family:'Share Tech Mono',monospace;display:none;}
  .mode-badge.visible{display:inline-block;}

  /* 구분 버튼 */
  .type-btns{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;}
  .type-btn{flex:1;min-width:72px;padding:11px 6px;border:1.5px solid var(--border);
    border-radius:10px;background:var(--bg);cursor:pointer;text-align:center;
    transition:all .18s;font-family:'Noto Sans KR',sans-serif;}
  .type-btn .ticon{font-size:16px;display:block;margin-bottom:3px;}
  .type-btn .tlabel{font-size:11px;font-weight:700;display:block;color:var(--muted);}
  .type-btn:hover{border-color:var(--border2);background:var(--surface);}
  .type-btn.sel-holiday {border-color:#ef4444;background:rgba(239,68,68,0.07);}
  .type-btn.sel-holiday .tlabel{color:#dc2626;}
  .type-btn.sel-duty    {border-color:#8b5cf6;background:rgba(139,92,246,0.07);}
  .type-btn.sel-duty .tlabel{color:#7c3aed;}
  .type-btn.sel-event   {border-color:#f59e0b;background:rgba(245,158,11,0.07);}
  .type-btn.sel-event .tlabel{color:#d97706;}
  .type-btn.sel-deadline{border-color:#1a56db;background:rgba(26,86,219,0.07);}
  .type-btn.sel-deadline .tlabel{color:#1a56db;}
  .type-btn.sel-etc     {border-color:#64748b;background:rgba(100,116,139,0.07);}
  .type-btn.sel-etc .tlabel{color:#475569;}

  /* 입력 필드 */
  .form-row{margin-bottom:16px;}
  .form-label{display:block;font-size:12px;font-weight:700;color:var(--text);
    margin-bottom:7px;letter-spacing:.3px;}
  .form-label span{color:var(--accent);}
  .form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;
    font-size:14px;font-family:'Noto Sans KR',sans-serif;color:var(--text);background:var(--bg);
    outline:none;transition:border-color .18s,background .18s;}
  .form-input:focus{border-color:var(--accent2);background:var(--surface);}
  .form-input::placeholder{color:var(--locked);}
  .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
  .duty-field{display:none;}
  .duty-field.visible{display:block;}

  /* 버튼 영역 */
  .btn-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px;}
  .submit-btn{padding:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;
    font-size:14px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;
    box-shadow:0 4px 14px rgba(200,0,30,0.25);transition:background .15s,transform .1s;
    display:flex;align-items:center;justify-content:center;gap:6px;}
  .submit-btn:hover{background:#a8001a;}
  .submit-btn:active{transform:scale(0.99);}
  .cal-goto-btn{padding:14px;background:var(--surface);color:var(--text);
    border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-weight:700;
    cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;
    display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none;}
  .cal-goto-btn:hover{border-color:var(--border2);background:var(--bg);}

  /* 수정 모드 배너 */
  .edit-banner{display:none;background:rgba(139,92,246,0.08);border:1.5px solid rgba(139,92,246,0.2);
    border-radius:10px;padding:10px 16px;margin-bottom:20px;
    display:none;align-items:center;justify-content:space-between;}
  .edit-banner.visible{display:flex;}
  .edit-banner-text{font-size:12px;font-weight:700;color:#6d28d9;}
  .edit-cancel-btn{font-size:11px;color:var(--muted);cursor:pointer;padding:4px 10px;
    border:1px solid var(--border);border-radius:20px;background:var(--surface);}
  .edit-cancel-btn:hover{color:var(--text);}

  /* 최근 내역 */
  .recent-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;
    padding:22px 26px;box-shadow:var(--shadow);}
  .recent-title{font-size:10px;font-weight:700;letter-spacing:3px;color:var(--muted);
    font-family:'Share Tech Mono',monospace;margin-bottom:14px;text-transform:uppercase;}
  .recent-list{display:flex;flex-direction:column;gap:8px;}
  .recent-item{display:flex;align-items:center;gap:10px;padding:9px 12px;
    background:var(--bg);border-radius:10px;font-size:12px;cursor:pointer;
    transition:background .12s;border:1px solid transparent;}
  .recent-item:hover{background:rgba(200,0,30,0.04);border-color:rgba(200,0,30,0.15);}
  .recent-date{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--muted);white-space:nowrap;}
  .recent-type-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:20px;
    white-space:nowrap;font-family:'Share Tech Mono',monospace;}
  .badge-holiday {background:rgba(200,0,30,0.1);  color:#9a0016;}
  .badge-duty    {background:rgba(109,40,217,0.1); color:#5219a8;}
  .badge-event   {background:rgba(180,83,9,0.1);   color:#92420a;}
  .badge-deadline{background:rgba(26,86,219,0.1);  color:#1239a0;}
  .badge-etc     {background:rgba(100,116,139,0.1);color:#475569;}
  .recent-entity{font-size:14px;}
  .recent-text{flex:1;font-size:12px;color:var(--text);font-weight:600;}
  .recent-person{font-size:11px;color:#5219a8;font-weight:600;}
  .recent-edit-hint{font-size:9px;color:var(--locked);font-family:'Share Tech Mono',monospace;
    white-space:nowrap;margin-left:auto;}
  .recent-empty{text-align:center;color:var(--locked);font-size:12px;padding:20px;}

  /* 국기 */
  .flag-img{width:24px;height:16px;border-radius:2px;border:.5px solid rgba(0,0,0,0.1);
    display:inline-block;vertical-align:middle;overflow:hidden;}

  /* 토스트 */
  .toast{display:none;position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
    background:#1a1612;color:#fff;padding:12px 24px;border-radius:50px;
    font-size:13px;font-weight:500;box-shadow:0 8px 28px rgba(0,0,0,0.2);
    z-index:999;white-space:nowrap;}

  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @media(max-width:560px){
    .page-wrap{padding:16px 12px 40px;}
    .form-card{padding:18px 16px;}
    .form-row-2{grid-template-columns:1fr;}
    .btn-row{grid-template-columns:1fr;}
    .topbar{padding:0 14px;}
    .entity-tabs{gap:5px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="home-btn">← MAIN</a>
    <div class="topbar-divider"></div>
    <div class="topbar-logo">
      <span class="red">SME</span> CALENDAR
      <span class="sub">일정 등록</span>
    </div>
  </div>
  <div class="topbar-clock" id="topClock">--:--:--</div>
</div>

<div class="page-wrap">

  <!-- 법인 탭 -->
  <div class="entity-tabs">
    <div class="entity-tab active" data-entity="HQ" onclick="selectEntity(this)">
      <span class="flag">🏢</span>
      <span class="ename">HQ</span>
      <span class="etime" id="time_HQ">--:--</span>
    </div>
    <div class="entity-tab" data-entity="GSMEIN" onclick="selectEntity(this)">
      <span class="flag">
        <svg class="flag-img" viewBox="0 0 900 600"><rect width="900" height="600" fill="#138808"/><rect width="900" height="400" fill="#fff"/><rect width="900" height="200" fill="#FF9933"/><circle cx="450" cy="300" r="90" fill="none" stroke="#000080" stroke-width="8"/><circle cx="450" cy="300" r="12" fill="#000080"/></svg>
      </span>
      <span class="ename">GSMEIN</span>
      <span class="etime" id="time_GSMEIN">--:--</span>
    </div>
    <div class="entity-tab" data-entity="SMEGLOBAL" onclick="selectEntity(this)">
      <span class="flag">
        <svg class="flag-img" viewBox="0 0 900 600"><rect width="900" height="600" fill="#A51931"/><rect width="900" height="500" fill="#fff"/><rect width="900" height="400" fill="#2D2A4A"/><rect width="900" height="300" fill="#fff"/><rect width="900" height="200" fill="#A51931"/></svg>
      </span>
      <span class="ename">SMEGLOBAL</span>
      <span class="etime" id="time_SMEGLOBAL">--:--</span>
    </div>
    <div class="entity-tab" data-entity="SMECN" onclick="selectEntity(this)">
      <span class="flag">
        <svg class="flag-img" viewBox="0 0 900 600"><rect width="900" height="600" fill="#DE2910"/><g fill="#FFDE00"><polygon points="150,75 163,116 205,116 171,141 184,182 150,157 116,182 129,141 95,116 137,116"/><polygon points="245,40 252,62 275,62 257,75 264,97 245,84 227,97 234,75 216,62 238,62"/><polygon points="290,90 297,112 320,112 302,125 309,147 290,134 272,147 279,125 261,112 283,112"/><polygon points="290,150 297,172 320,172 302,185 309,207 290,194 272,207 279,185 261,172 283,172"/><polygon points="245,200 252,222 275,222 257,235 264,257 245,244 227,257 234,235 216,222 238,222"/></g></svg>
      </span>
      <span class="ename">SMECN</span>
      <span class="etime" id="time_SMECN">--:--</span>
    </div>
  </div>

  <!-- 등록/수정 폼 -->
  <div class="form-card" style="animation:fadeUp .4s ease;">

    <div class="mode-bar">
      <div class="mode-label">구분 선택</div>
      <div class="mode-badge" id="modeBadge"></div>
    </div>

    <!-- 수정 모드 배너 -->
    <div class="edit-banner" id="editBanner">
      <span class="edit-banner-text">✏️ 수정 모드 — 기존 일정을 수정합니다</span>
      <span class="edit-cancel-btn" onclick="cancelEdit()">✕ 취소</span>
    </div>

    <div class="type-btns">
      <button class="type-btn" data-type="휴무" onclick="selectType(this)">
        <span class="ticon">🔴</span><span class="tlabel">휴무</span>
      </button>
      <button class="type-btn" data-type="당직" onclick="selectType(this)">
        <span class="ticon">🟣</span><span class="tlabel">당직</span>
      </button>
      <button class="type-btn" data-type="일정" onclick="selectType(this)">
        <span class="ticon">🟡</span><span class="tlabel">일정</span>
      </button>
      <button class="type-btn" data-type="마감" onclick="selectType(this)">
        <span class="ticon">🔵</span><span class="tlabel">마감</span>
      </button>
      <button class="type-btn" data-type="기타" onclick="selectType(this)">
        <span class="ticon">🔘</span><span class="tlabel">기타</span>
      </button>
    </div>

    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0;">
        <label class="form-label">날짜 <span>*</span></label>
        <input class="form-input" type="date" id="fDate">
      </div>
      <div class="form-row duty-field" id="dutyField" style="margin-bottom:0;">
        <label class="form-label">당직자 <span>*</span></label>
        <input class="form-input" type="text" id="fDuty" placeholder="이름 입력">
      </div>
    </div>

    <div class="form-row" style="margin-top:16px;">
      <label class="form-label">제목 <span>*</span></label>
      <input class="form-input" type="text" id="fTitle" placeholder="구분을 먼저 선택하세요">
    </div>

    <div class="form-row-2">
      <div class="form-row" style="margin-bottom:0;">
        <label class="form-label">등록자 <span>*</span></label>
        <input class="form-input" type="text" id="fWriter" placeholder="이름 입력">
      </div>
      <div class="form-row" style="margin-bottom:0;">
        <label class="form-label">비고</label>
        <input class="form-input" type="text" id="fNote" placeholder="선택입력">
      </div>
    </div>

    <!-- 버튼 행 -->
    <div class="btn-row">
      <button class="submit-btn" id="submitBtn" onclick="submitSchedule()">
        <span>📅</span> <span id="submitLabel">등록하기</span>
      </button>
      <a href="schedule.html" class="cal-goto-btn">
        <span>📆</span> 캘린더 보기
      </a>
    </div>

  </div>

  <!-- 최근 등록 내역 -->
  <div class="recent-card" style="animation:fadeUp .4s ease .1s both;">
    <div class="recent-title">최근 등록 내역 <span style="font-size:9px;color:var(--locked);"> · 클릭하면 수정</span></div>
    <div class="recent-list" id="recentList">
      <div class="recent-empty">데이터를 불러오는 중...</div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const APPS_URL='https://script.google.com/macros/s/AKfycbxRHuFdQQIDowkSFIV2wAhCHcXdD740pFDD6pZ3qzMx1hkyo_2Lbt39_6AOIYnwbU7TGg/exec';

let selectedEntity='HQ', selectedType='', isEditMode=false, editRowData=null;

// 구분별 기본 제목
const typeDefaultTitle={휴무:'휴무',당직:'당직',일정:'일정',마감:'마감',기타:''};
const typeClsMap={휴무:'sel-holiday',당직:'sel-duty',일정:'sel-event',마감:'sel-deadline',기타:'sel-etc'};
const typeIconMap={휴무:'🔴',당직:'🟣',일정:'🟡',마감:'🔵',기타:'🔘'};
const typeBadgeMap={휴무:'badge-holiday',당직:'badge-duty',일정:'badge-event',마감:'badge-deadline',기타:'badge-etc'};
const entityFlag={HQ:'🏢',GSMEIN:'🇮🇳',SMEGLOBAL:'🇹🇭',SMECN:'🇨🇳'};

/* 법인 선택 */
function selectEntity(el){
  document.querySelectorAll('.entity-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  selectedEntity=el.dataset.entity;
  loadRecent();
}

/* 구분 선택 — 제목 자동입력 */
function selectType(el){
  document.querySelectorAll('.type-btn').forEach(b=>b.className='type-btn');
  const t=el.dataset.type;
  selectedType=t;
  el.classList.add(typeClsMap[t]||'');

  // 당직자 필드
  document.getElementById('dutyField').classList.toggle('visible',t==='당직');

  // 제목 자동입력 (비어있거나 기존 기본값일 때만)
  const titleEl=document.getElementById('fTitle');
  const currentTitle=titleEl.value.trim();
  const prevDefaults=Object.values(typeDefaultTitle);
  if(!currentTitle||prevDefaults.includes(currentTitle)){
    titleEl.value=typeDefaultTitle[t]||'';
  }
  if(typeDefaultTitle[t]){
    titleEl.select();
  } else {
    titleEl.focus();
  }

  // 모드 배지
  const badge=document.getElementById('modeBadge');
  badge.textContent=`${typeIconMap[t]} ${t}`;
  badge.className='mode-badge visible';
}

/* URL 파라미터로 수정 모드 진입 */
function checkEditMode(){
  const params=new URLSearchParams(window.location.search);
  if(params.get('mode')==='edit'){
    try{
      editRowData=JSON.parse(decodeURIComponent(params.get('data')));
      fillEditForm(editRowData);
    }catch(e){}
  }
}

/* 수정 폼 채우기 */
function fillEditForm(d){
  isEditMode=true;
  document.getElementById('editBanner').classList.add('visible');
  document.getElementById('submitLabel').textContent='수정 저장';

  // 법인 탭
  document.querySelectorAll('.entity-tab').forEach(t=>{
    t.classList.toggle('active',t.dataset.entity===d.entity);
  });
  selectedEntity=d.entity;

  // 구분
  const btn=document.querySelector(`.type-btn[data-type="${d.type}"]`);
  if(btn) selectType(btn);

  // 필드
  document.getElementById('fDate').value=d.date||'';
  document.getElementById('fTitle').value=d.title||'';
  document.getElementById('fDuty').value=d.duty||'';
  document.getElementById('fWriter').value=d.writer||'';
  document.getElementById('fNote').value=d.note||'';
}

/* 수정 취소 */
function cancelEdit(){
  isEditMode=false; editRowData=null;
  document.getElementById('editBanner').classList.remove('visible');
  document.getElementById('submitLabel').textContent='등록하기';
  resetForm();
  window.history.replaceState({},'',window.location.pathname);
}

/* 폼 리셋 */
function resetForm(){
  selectedType='';
  document.querySelectorAll('.type-btn').forEach(b=>b.className='type-btn');
  document.getElementById('fTitle').value='';
  document.getElementById('fDuty').value='';
  document.getElementById('fNote').value='';
  document.getElementById('dutyField').classList.remove('visible');
  document.getElementById('modeBadge').className='mode-badge';
}

/* 등록/수정 */
async function submitSchedule(){
  const date  =document.getElementById('fDate').value;
  const title =document.getElementById('fTitle').value.trim();
  const writer=document.getElementById('fWriter').value.trim();
  const duty  =document.getElementById('fDuty').value.trim();
  const note  =document.getElementById('fNote').value.trim();

  if(!selectedType) return showToast('⚠ 구분을 선택해주세요');
  if(!date)         return showToast('⚠ 날짜를 선택해주세요');
  if(!title)        return showToast('⚠ 제목을 입력해주세요');
  if(!writer)       return showToast('⚠ 등록자를 입력해주세요');
  if(selectedType==='당직'&&!duty) return showToast('⚠ 당직자를 입력해주세요');

  const now=new Date();
  const ts=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;

  // 수정 모드: 기존 행 삭제 후 새로 추가 (rowIndex 기반)
  const action = isEditMode && editRowData?.rowIndex
    ? `schedule_update&rowIndex=${editRowData.rowIndex}`
    : 'schedule_add';

  const payload=[ts,date,selectedEntity,selectedType,title,duty,writer,note].join('||');

  try{
    await fetch(`${APPS_URL}?action=${action}`,{
      method:'POST',mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:payload
    });
    showToast(isEditMode?'✅ 수정되었습니다':'✅ 등록되었습니다');
    if(isEditMode) cancelEdit();
    else{
      document.getElementById('fTitle').value='';
      document.getElementById('fDuty').value='';
      document.getElementById('fNote').value='';
    }
    setTimeout(loadRecent,1500);
  }catch(e){
    showToast('⚠ 처리 중 오류가 발생했습니다');
  }
}

/* 최근 내역 로드 */
async function loadRecent(){
  const list=document.getElementById('recentList');
  try{
    const res=await fetch(`${APPS_URL}?action=schedule_list&entity=${selectedEntity}&limit=8`);
    const data=await res.json();
    if(!data.length){list.innerHTML='<div class="recent-empty">등록된 일정이 없습니다</div>';return;}
    list.innerHTML=data.map((r,i)=>`
      <div class="recent-item" onclick="loadEditData(${JSON.stringify(JSON.stringify(r)).slice(1,-1)},${i})">
        <span class="recent-date">${r.date}</span>
        <span class="recent-type-badge ${typeBadgeMap[r.type]||'badge-etc'}">${typeIconMap[r.type]||'🔘'} ${r.type}</span>
        <span class="recent-entity">${entityFlag[r.entity]||''}</span>
        <span class="recent-text">${r.title}</span>
        ${r.duty?`<span class="recent-person">${r.duty}</span>`:''}
        <span class="recent-edit-hint">수정 →</span>
      </div>`).join('');
  }catch(e){
    list.innerHTML='<div class="recent-empty">데이터 연결 대기중</div>';
  }
}

/* 최근내역 클릭 → 수정 모드 */
function loadEditData(jsonStr,idx){
  try{
    const d=JSON.parse(jsonStr);
    editRowData=d;
    fillEditForm(d);
    window.scrollTo({top:0,behavior:'smooth'});
    showToast('✏️ 수정 모드로 전환되었습니다');
  }catch(e){}
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>{t.style.display='none';},2500);
}

function tzTime(off){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+off*3600000);}
function updateClocks(){
  const k=tzTime(9);
  const h=String(k.getHours()).padStart(2,'0');
  const m=String(k.getMinutes()).padStart(2,'0');
  const s=String(k.getSeconds()).padStart(2,'0');
  document.getElementById('topClock').textContent=`${h}:${m}:${s}`;
  const fmt=d=>`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  document.getElementById('time_HQ').textContent      =fmt(tzTime(9));
  document.getElementById('time_GSMEIN').textContent  =fmt(tzTime(5.5));
  document.getElementById('time_SMEGLOBAL').textContent=fmt(tzTime(7));
  document.getElementById('time_SMECN').textContent   =fmt(tzTime(8));
}
setInterval(updateClocks,1000); updateClocks();

// 오늘 날짜 기본값
const td=new Date();
document.getElementById('fDate').value=`${td.getFullYear()}-${String(td.getMonth()+1).padStart(2,'0')}-${String(td.getDate()).padStart(2,'0')}`;

checkEditMode();
loadRecent();
</script>
