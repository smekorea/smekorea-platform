<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEKOREA 출하지시 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef2f7; --surface: #ffffff; --border: #d0daea;
    --accent: #c8001e; --accent2: #1a56db; --text: #1a2233;
    --muted: #7a8baa; --success: #0e9f6e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 32px 20px;
    background-image: radial-gradient(ellipse at 0% 0%, rgba(200,0,30,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(26,86,219,0.05) 0%, transparent 50%);
  }
  .header { text-align: center; margin-bottom: 28px; animation: fadeDown 0.5s ease; }
  .logo-wrap { display: inline-flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .logo-box {
    width: 52px; height: 52px; background: var(--accent); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace; font-size: 18px; font-weight: 900;
    color: #fff; letter-spacing: -1px; box-shadow: 0 4px 16px rgba(200,0,30,0.3);
  }
  .company-name { font-size: 20px; font-weight: 700; color: var(--text); }
  .company-sub { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; margin-top: 2px; }
  .page-title { font-size: 28px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
  .page-title span { color: var(--accent); }
  .page-title.edit-mode span { color: var(--accent2); }
  .page-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .edit-banner {
    display: none; background: rgba(26,86,219,0.08); border: 1.5px solid rgba(26,86,219,0.2);
    border-radius: 8px; padding: 10px 16px; margin-bottom: 16px;
    font-size: 13px; color: var(--accent2); font-weight: 600; text-align: center;
  }
  .edit-banner.show { display: block; }

  .card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    padding: 36px; width: 100%; max-width: 520px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08); animation: fadeUp 0.5s ease 0.1s both;
    position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .card.edit-mode::before { background: linear-gradient(90deg, var(--accent2), var(--success)); }

  .field { margin-bottom: 20px; }
  label {
    display: block; font-size: 12px; font-weight: 600; letter-spacing: 1.5px;
    color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
  }
  label .req { color: var(--accent); margin-left: 2px; }

  input, select, textarea {
    width: 100%; background: #f8fafc; border: 1.5px solid var(--border);
    border-radius: 8px; color: var(--text); font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px; padding: 12px 16px; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent2); background: #fff; box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
  }
  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  /* 도착시간 — 시/분 분리 */
  .time-wrap { display: flex; gap: 8px; align-items: center; }
  .time-wrap select { flex: 1; }
  .time-sep { font-size: 18px; font-weight: 700; color: var(--muted); flex-shrink: 0; }

  /* 포장 단위 — 숫자 + 단위 */
  .pack-wrap { display: flex; gap: 8px; align-items: center; }
  .pack-wrap input[type="number"] { flex: 1; }
  .unit-group { display: flex; gap: 6px; flex-shrink: 0; }
  .pack-result {
    margin-top: 8px; padding: 10px 16px; border-radius: 8px;
    background: rgba(26,86,219,0.06); border: 1.5px solid rgba(26,86,219,0.2);
    font-size: 20px; font-weight: 900; color: var(--accent2);
    font-family: "Share Tech Mono", monospace; letter-spacing: 1px;
    text-align: center; display: none;
  }
  .pack-result.show { display: block; }
  .unit-btn { position: relative; }
  .unit-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; }
  .unit-btn label {
    display: flex; align-items: center; justify-content: center;
    padding: 12px 18px; background: #f8fafc; border: 1.5px solid var(--border);
    border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 700;
    color: var(--muted); transition: all 0.2s; text-transform: none; letter-spacing: 0;
    white-space: nowrap;
  }
  .unit-btn input[type="radio"]:checked + label {
    border-color: var(--accent2); color: var(--accent2);
    background: rgba(26,86,219,0.06); 
  }

  /* 부서 라디오 */
  .radio-group { display: flex; gap: 10px; }
  .radio-btn { flex: 1; position: relative; }
  .radio-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; }
  .radio-btn label {
    display: flex; align-items: center; justify-content: center; padding: 12px;
    background: #f8fafc; border: 1.5px solid var(--border); border-radius: 8px;
    cursor: pointer; font-size: 14px; font-weight: 500; letter-spacing: 0.3px;
    text-transform: none; color: var(--muted); transition: all 0.2s;
  }
  .radio-btn input[type="radio"]:checked + label {
    border-color: var(--accent); color: var(--accent);
    background: rgba(200,0,30,0.05); font-weight: 700;
  }

  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }

  .btn-group { display: flex; gap: 10px; }
  .btn {
    flex: 1; padding: 15px; background: var(--accent); color: #fff;
    font-family: 'Noto Sans KR', sans-serif; font-size: 16px; font-weight: 700;
    border: none; border-radius: 8px; cursor: pointer; letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(200,0,30,0.25); margin-top: 4px;
  }
  .btn:hover { background: #a80019; }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn.blue { background: var(--accent2); box-shadow: 0 4px 12px rgba(26,86,219,0.25); }
  .btn.blue:hover { background: #1344b0; }
  .btn.cancel { background: #f8fafc; color: var(--muted); border: 1.5px solid var(--border); box-shadow: none; }
  .btn.cancel:hover { background: var(--border); }

  .toast {
    position: fixed; bottom: 32px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success); color: #fff; font-weight: 700; font-size: 14px;
    padding: 14px 28px; border-radius: 50px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100; white-space: nowrap; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #e02424; }

  .display-link { text-align: center; margin-top: 18px; font-size: 13px; color: var(--muted); animation: fadeUp 0.5s ease 0.3s both; }
  .display-link a { color: var(--accent2); text-decoration: none; font-weight: 600; }

  @keyframes fadeDown { from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-box">SME</div>
    <div>
      <div class="company-name">SMEKOREA</div>
      <div class="company-sub">SHIPPING SYSTEM</div>
    </div>
  </div>
  <h1 class="page-title" id="pageTitle">출하 지시 <span id="titleSpan">입력</span></h1>
  <p class="page-sub" id="pageSub">구매팀 전용 — 입력 후 출하팀 모니터에 자동 표시됩니다</p>
</div>

<div class="edit-banner" id="editBanner">✏ 수정 모드 — 기존 데이터를 불러왔습니다. 수정 후 저장해주세요.</div>

<div class="card" id="mainCard">

  <div class="field">
    <label>입력 부서 <span class="req">*</span></label>
    <div class="radio-group">
      <div class="radio-btn"><input type="radio" name="dept" id="dept1" value="자재구매"><label for="dept1">자재구매</label></div>
      <div class="radio-btn"><input type="radio" name="dept" id="dept2" value="개발구매"><label for="dept2">개발구매</label></div>
    </div>
  </div>

  <div class="field">
    <label>담당자 이름 <span class="req">*</span></label>
    <input type="text" id="manager" placeholder="담당자 이름 입력">
  </div>

  <div class="row2">
    <div class="field">
      <label>출하 일자 <span class="req">*</span></label>
      <input type="date" id="shipDate">
    </div>
    <div class="field">
      <label>도착 시간</label>
      <div class="time-wrap">
        <select id="arrHour">
          <option value="">시간</option>
          <option>06</option><option>07</option><option>08</option><option>09</option>
          <option>10</option><option>11</option><option>12</option><option>13</option>
          <option>14</option><option>15</option><option>16</option><option>17</option>
          <option>18</option><option>19</option><option>20</option>
        </select>
        <span class="time-sep">:</span>
        <select id="arrMin">
          <option value="00">00</option>
          <option value="30">30</option>
        </select>
      </div>
    </div>
  </div>

  <div class="field">
    <label>매출처명 <span class="req">*</span></label>
    <input type="text" id="customer" placeholder="예: LG전자 창원공장">
  </div>

  <div class="field">
    <label>포장 수량 <span class="req">*</span></label>
    <div class="pack-wrap">
      <input type="number" id="packQty" placeholder="수량 입력" min="0" step="0.5">
      <div class="unit-group">
        <div class="unit-btn"><input type="radio" name="unit" id="unit1" value="PL"><label for="unit1">PL</label></div>
        <div class="unit-btn"><input type="radio" name="unit" id="unit2" value="BOX"><label for="unit2">BOX</label></div>
      </div>
    </div>
    <div class="pack-result" id="packResult">-</div>
  </div>

  <div class="field">
    <label>비고 / 특이사항</label>
    <textarea id="note" placeholder="오전 출하, 긴급, 냉장보관 등 특이사항 입력"></textarea>
  </div>

  <hr class="divider">

  <div class="btn-group">
    <button class="btn cancel" id="cancelBtn" style="display:none" onclick="cancelEdit()">취소</button>
    <button class="btn" id="submitBtn" onclick="submitForm()">출하 지시 등록</button>
  </div>

</div>

<div class="display-link">
  출하팀 모니터 화면 → <a href="display.html">출하 현황판 보기</a>
</div>
<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxA2KffEWK3E4lzHOYO3av-3U54FMKMgoOzCu9tYKJ-GPvdxZxr1pWIvM2-PnP_bhP-/exec';
  function getLocalDateStr() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + dd;
  }
  const today = getLocalDateStr();
  document.getElementById('shipDate').value = today;

  // 수정 모드 데이터 (URL 파라미터로 전달)
  let editMode = false;
  let origData = {};

  function loadEditData() {
    const params = new URLSearchParams(window.location.search);
    if (!params.get('edit')) return;

    editMode = true;
    origData = {
      shipDate: params.get('shipDate') || '',
      customer: params.get('customer') || '',
      manager: params.get('manager') || '',
    };

    // UI 수정모드
    document.getElementById('titleSpan').textContent = '수정';
    document.getElementById('pageSub').textContent = '기존 출하 지시를 수정합니다';
    document.getElementById('editBanner').classList.add('show');
    document.getElementById('mainCard').classList.add('edit-mode');
    document.getElementById('cancelBtn').style.display = 'flex';
    document.getElementById('submitBtn').textContent = '수정 저장';
    document.getElementById('submitBtn').classList.add('blue');

    // 데이터 채우기
    const dept = params.get('inputBy') || '';
    document.querySelectorAll('input[name="dept"]').forEach(r => { if (r.value === dept) r.checked = true; });
    document.getElementById('manager').value = params.get('manager') || '';
    document.getElementById('shipDate').value = params.get('shipDate') || today;
    document.getElementById('customer').value = params.get('customer') || '';
    document.getElementById('note').value = params.get('note') || '';

    // 도착시간
    const arr = params.get('arrivalTime') || '';
    if (arr && arr !== '-') {
      const parts = arr.split(':');
      if (parts.length >= 2) {
        document.getElementById('arrHour').value = parts[0];
        document.getElementById('arrMin').value = parts[1] === '30' ? '30' : '00';
      }
    }

    // 포장 수량
    const pack = params.get('packDone') || '';
    if (pack) {
      const match = pack.match(/^([\d.]+)(PL|BOX)$/);
      if (match) {
        document.getElementById('packQty').value = match[1];
        document.querySelectorAll('input[name="unit"]').forEach(r => { if (r.value === match[2]) r.checked = true; });
      }
    }
  }

  function cancelEdit() {
    window.location.href = 'display.html';
  }

  function jsonp(url, params) {
    return new Promise(function(resolve) {
      var cbName = 'cb_' + Date.now();
      params.callback = cbName;
      var script = document.createElement('script');
      script.src = url + '?' + new URLSearchParams(params).toString();
      window[cbName] = function() {
        delete window[cbName];
        document.body.removeChild(script);
        resolve();
      };
      script.onerror = function() {
        delete window[cbName];
        document.body.removeChild(script);
        resolve();
      };
      document.body.appendChild(script);
      setTimeout(resolve, 3000);
    });
  }

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function submitForm() {
    const dept = document.querySelector('input[name="dept"]:checked');
    const unit = document.querySelector('input[name="unit"]:checked');
    const manager = document.getElementById('manager').value.trim();
    const shipDate = document.getElementById('shipDate').value;
    const arrHour = document.getElementById('arrHour').value;
    const arrMin = document.getElementById('arrMin').value;
    const customer = document.getElementById('customer').value.trim();
    const packQty = document.getElementById('packQty').value.trim();
    const note = document.getElementById('note').value.trim();

    if (!dept) { showToast('⚠ 입력 부서를 선택해주세요', true); return; }
    if (!manager) { showToast('⚠ 담당자 이름을 입력해주세요', true); return; }
    if (!shipDate) { showToast('⚠ 출하 일자를 선택해주세요', true); return; }
    if (!customer) { showToast('⚠ 매출처명을 입력해주세요', true); return; }
    if (!packQty || !unit) { showToast('⚠ 포장 수량과 단위를 입력해주세요', true); return; }

    const arrivalTime = arrHour ? `${arrHour}:${arrMin}` : '-';
    const packDone = `${packQty}${unit.value}`;

    const btn = document.getElementById('submitBtn');
    btn.disabled = true; btn.textContent = editMode ? '저장 중...' : '등록 중...';

    try {
      const body = editMode
        ? { action: 'update', origDate: origData.shipDate, origCustomer: origData.customer, origManager: origData.manager, shipDate, customer, note, inputBy: dept.value, manager, arrivalTime, packDone }
        : { shipDate, customer, note, inputBy: dept.value, manager, arrivalTime, packDone };

      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(body)
      });
      await new Promise(resolve => setTimeout(resolve, 1000));

      if (editMode) {
        showToast('✓ 수정이 완료되었습니다');
        setTimeout(() => window.location.href = 'display.html', 1500);
      } else {
        showToast('✓ 출하 지시가 등록되었습니다');
        document.getElementById('manager').value = '';
        document.getElementById('customer').value = '';
        document.getElementById('note').value = '';
        document.getElementById('packQty').value = '';
        document.getElementById('arrHour').value = '';
        document.getElementById('arrMin').value = '00';
        document.querySelectorAll('input[type="radio"]').forEach(r => r.checked = false);
        document.getElementById('shipDate').value = today;
      }
    } catch (err) {
      showToast('⚠ 실패. 네트워크를 확인해주세요', true);
    }

    btn.disabled = false;
    btn.textContent = editMode ? '수정 저장' : '출하 지시 등록';
  }

  function updatePackResult() {
    const qty = document.getElementById('packQty').value.trim();
    const unit = document.querySelector('input[name="unit"]:checked');
    const el = document.getElementById('packResult');
    if (qty && unit) {
      el.textContent = qty + ' ' + unit.value;
      el.classList.add('show');
    } else if (qty) {
      el.textContent = qty + ' ?';
      el.classList.add('show');
    } else {
      el.classList.remove('show');
    }
  }

  document.getElementById('packQty').addEventListener('input', updatePackResult);
  document.querySelectorAll('input[name="unit"]').forEach(r => r.addEventListener('change', updatePackResult));

  loadEditData();
</script>
</body>
</html>
