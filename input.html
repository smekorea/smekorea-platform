<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEKOREA 출하지시 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #eef2f7;
    --surface: #ffffff;
    --border: #d0daea;
    --accent: #c8001e;
    --accent2: #1a56db;
    --text: #1a2233;
    --muted: #7a8baa;
    --success: #0e9f6e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
    background-image:
      radial-gradient(ellipse at 0% 0%, rgba(200,0,30,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 100% 100%, rgba(26,86,219,0.05) 0%, transparent 50%);
  }

  .header {
    text-align: center;
    margin-bottom: 28px;
    animation: fadeDown 0.5s ease;
  }

  .logo-wrap {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 14px;
  }

  .logo-box {
    width: 52px;
    height: 52px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 18px;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    box-shadow: 0 4px 16px rgba(200,0,30,0.3);
  }

  .logo-text-wrap { text-align: left; }

  .company-name {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .company-sub {
    font-size: 11px;
    color: var(--muted);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 2px;
    margin-top: 2px;
  }

  .page-title {
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
  }

  .page-title span { color: var(--accent); }

  .page-sub {
    font-size: 13px;
    color: var(--muted);
    margin-top: 6px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 36px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    animation: fadeUp 0.5s ease 0.1s both;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .field { margin-bottom: 20px; }

  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  label .req { color: var(--accent); margin-left: 2px; }

  input, select, textarea {
    width: 100%;
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--accent2);
    background: #fff;
    box-shadow: 0 0 0 3px rgba(26,86,219,0.1);
  }

  textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

  .radio-group { display: flex; gap: 10px; }

  .radio-btn { flex: 1; position: relative; }

  .radio-btn input[type="radio"] { position: absolute; opacity: 0; width: 0; }

  .radio-btn label {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    background: #f8fafc;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.3px;
    text-transform: none;
    color: var(--muted);
    transition: all 0.2s;
  }

  .radio-btn input[type="radio"]:checked + label {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(200,0,30,0.05);
    font-weight: 700;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  .btn {
    width: 100%;
    padding: 15px;
    background: var(--accent);
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    font-weight: 700;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    box-shadow: 0 4px 12px rgba(200,0,30,0.25);
    margin-top: 4px;
  }

  .btn:hover { background: #a80019; box-shadow: 0 6px 16px rgba(200,0,30,0.35); }
  .btn:active { transform: scale(0.99); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--success);
    color: #fff;
    font-weight: 700;
    font-size: 14px;
    padding: 14px 28px;
    border-radius: 50px;
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    white-space: nowrap;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: #e02424; }

  .display-link {
    text-align: center;
    margin-top: 18px;
    font-size: 13px;
    color: var(--muted);
    animation: fadeUp 0.5s ease 0.3s both;
  }

  .display-link a {
    color: var(--accent2);
    text-decoration: none;
    font-weight: 600;
  }

  .display-link a:hover { text-decoration: underline; }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo-wrap">
    <div class="logo-box">SME</div>
    <div class="logo-text-wrap">
      <div class="company-name">SMEKOREA</div>
      <div class="company-sub">SHIPPING SYSTEM</div>
    </div>
  </div>
  <h1 class="page-title">출하 지시 <span>입력</span></h1>
  <p class="page-sub">3층 구매팀 전용 — 입력 후 1층 모니터에 자동 표시됩니다</p>
</div>

<div class="card">

  <div class="field">
    <label>입력 부서 <span class="req">*</span></label>
    <div class="radio-group">
      <div class="radio-btn">
        <input type="radio" name="dept" id="dept1" value="자재구매">
        <label for="dept1">자재구매</label>
      </div>
      <div class="radio-btn">
        <input type="radio" name="dept" id="dept2" value="개발구매">
        <label for="dept2">개발구매</label>
      </div>
    </div>
  </div>

  <div class="field">
    <label>담당자 이름 <span class="req">*</span></label>
    <input type="text" id="manager" placeholder="담당자 이름 입력">
  </div>

  <div class="field">
    <label>출하 일자 <span class="req">*</span></label>
    <input type="date" id="shipDate">
  </div>

  <div class="field">
    <label>매출처명 <span class="req">*</span></label>
    <input type="text" id="customer" placeholder="예: LG전자 창원공장">
  </div>

  <div class="field">
    <label>비고 / 특이사항</label>
    <textarea id="note" placeholder="오전 출하, 긴급, 냉장보관 등 특이사항 입력"></textarea>
  </div>

  <hr class="divider">

  <button class="btn" onclick="submitForm()">출하 지시 등록</button>

</div>

<div class="display-link">
  1층 모니터 화면 →
  <a href="display.html" target="_blank">출하 현황판 보기</a>
</div>

<div class="toast" id="toast"></div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwilhcycOmd9lTpfegX8yuTh2Sl9qQiuW5ZHa-Xo7EAZBZiPzxxUrZ6prGXrKZP40tX/exec';

  const today = new Date().toISOString().split('T')[0];
  document.getElementById('shipDate').value = today;

  function showToast(msg, isError) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'toast' + (isError ? ' error' : '') + ' show';
    setTimeout(() => t.className = 'toast', 3000);
  }

  async function submitForm() {
    const dept = document.querySelector('input[name="dept"]:checked');
    const manager = document.getElementById('manager').value.trim();
    const shipDate = document.getElementById('shipDate').value;
    const customer = document.getElementById('customer').value.trim();
    const note = document.getElementById('note').value.trim();

    if (!dept) { showToast('⚠ 입력 부서를 선택해주세요', true); return; }
    if (!manager) { showToast('⚠ 담당자 이름을 입력해주세요', true); return; }
    if (!shipDate) { showToast('⚠ 출하 일자를 선택해주세요', true); return; }
    if (!customer) { showToast('⚠ 매출처명을 입력해주세요', true); return; }

    const btn = document.querySelector('.btn');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ shipDate, customer, note, inputBy: dept.value, manager })
      });

      showToast('✓ 출하 지시가 등록되었습니다');
      document.getElementById('manager').value = '';
      document.getElementById('customer').value = '';
      document.getElementById('note').value = '';
      document.querySelectorAll('input[name="dept"]').forEach(r => r.checked = false);
      document.getElementById('shipDate').value = today;

    } catch (err) {
      showToast('⚠ 등록 실패. 네트워크를 확인해주세요', true);
    }

    btn.disabled = false;
    btn.textContent = '출하 지시 등록';
  }
</script>
</body>
</html>
