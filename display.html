<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEKOREA 출하 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f9; --surface: #ffffff; --surface2: #e8eef6; --border: #cdd8ea;
    --accent: #c8001e; --accent2: #1a56db; --accent3: #0e9f6e;
    --text: #1a2233; --muted: #7a8baa; --warn: #d97706;
    --today-bg: rgba(200,0,30,0.05); --tomorrow-bg: rgba(26,86,219,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  /* 상단 헤더 */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 28px; background: var(--surface);
    border-bottom: 2px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 10;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-box {
    width: 44px; height: 44px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace; font-size: 15px; font-weight: 900;
    color: #fff; letter-spacing: -1px; box-shadow: 0 3px 10px rgba(200,0,30,0.3);
  }
  .logo-title { font-size: 16px; font-weight: 700; }
  .logo-sub { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; margin-top: 1px; }

  .topbar-right { display: flex; align-items: center; gap: 16px; }

  .input-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; background: var(--accent); color: #fff;
    border: none; border-radius: 8px; cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif; font-size: 13px; font-weight: 700;
    text-decoration: none; transition: background 0.2s;
    box-shadow: 0 2px 8px rgba(200,0,30,0.3);
  }
  .input-btn:hover { background: #a80019; }

  .clock { font-family: 'Share Tech Mono', monospace; font-size: 26px; color: var(--accent); letter-spacing: 2px; line-height: 1; }
  .date-str { font-size: 11px; color: var(--muted); margin-top: 2px; text-align: right; }
  .refresh-info { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

  /* 섹션 라벨 */
  .section-label {
    display: flex; align-items: center; gap: 10px; padding: 7px 28px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    font-size: 10px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  }
  .section-label .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  /* 메인 2분할 */
  .main-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 2px solid var(--border); min-height: 320px; }

  /* 오늘 출하 */
  .today-col { padding: 14px 20px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .col-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .col-title-wrap { display: flex; align-items: center; gap: 8px; }
  .col-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .red-dot { background: var(--accent); box-shadow: 0 0 8px rgba(200,0,30,0.4); }
  .col-title { font-size: 15px; font-weight: 700; color: var(--accent); }
  .count-badge { font-size: 10px; font-family: 'Share Tech Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px; border-radius: 20px; color: var(--muted); }

  .ship-cards { display: flex; flex-direction: column; gap: 7px; overflow-y: auto; max-height: 260px; padding-right: 3px; }
  .ship-cards::-webkit-scrollbar { width: 3px; }
  .ship-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* 카드 */
  .ship-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; animation: fadeIn 0.3s ease; }
  .ship-card.today-card { border-left: 3px solid var(--accent); background: var(--today-bg); }
  .ship-card.week-card { border-left: 3px solid var(--accent2); background: var(--tomorrow-bg); }
  .ship-card.done-card { opacity: 0.7; border-left-color: var(--accent3) !important; background: rgba(14,159,110,0.08) !important; border-color: var(--accent3) !important; }

  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
  .customer-name { font-size: 15px; font-weight: 700; }
  .done-card .customer-name { text-decoration: line-through; color: var(--accent3); }

  .tags { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .tag { font-size: 9px; font-family: 'Share Tech Mono', monospace; padding: 2px 7px; border-radius: 4px; white-space: nowrap; }
  .tag-material { background: rgba(200,0,30,0.1); color: var(--accent); border: 1px solid rgba(200,0,30,0.2); }
  .tag-dev { background: rgba(26,86,219,0.1); color: var(--accent2); border: 1px solid rgba(26,86,219,0.2); }
  .tag-pack { background: rgba(14,159,110,0.1); color: var(--accent3); border: 1px solid rgba(14,159,110,0.2); }
  .tag-done { background: rgba(14,159,110,0.15); color: var(--accent3); border: 1px solid rgba(14,159,110,0.3); }

  .card-meta { display: flex; gap: 10px; font-size: 10px; color: var(--muted); flex-wrap: wrap; }
  .note-text { font-size: 11px; color: var(--muted); padding-top: 4px; border-top: 1px solid var(--border); }
  .note-text.has-note { color: var(--warn); font-weight: 500; }

  .card-actions { display: flex; gap: 5px; margin-top: 3px; }
  .action-btn { padding: 4px 10px; border-radius: 5px; font-family: 'Noto Sans KR', sans-serif; font-size: 10px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid; }
  .complete-btn { background: var(--surface2); border-color: var(--border); color: var(--muted); }
  .complete-btn:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); }
  .edit-btn { background: var(--surface2); border-color: var(--border); color: var(--accent2); }
  .edit-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  /* 주간 요일 탭 */
  .week-col { padding: 14px 20px; display: flex; flex-direction: column; }
  .week-tabs { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
  .week-tab {
    padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600;
    cursor: pointer; border: 1.5px solid var(--border); background: var(--surface2);
    color: var(--muted); transition: all 0.2s; font-family: 'Noto Sans KR', sans-serif;
  }
  .week-tab:hover { border-color: var(--accent2); color: var(--accent2); }
  .week-tab.active { background: var(--accent2); color: #fff; border-color: var(--accent2); }
  .week-tab.today-tab { border-color: var(--accent); color: var(--accent); background: var(--today-bg); }
  .week-tab.today-tab.active { background: var(--accent); color: #fff; }
  .week-tab.tomorrow-tab { border-color: var(--accent2); color: var(--accent2); background: var(--tomorrow-bg); }

  .week-content { flex: 1; overflow-y: auto; }

  /* 30일 요약 */
  .summary-section { padding: 12px 28px; border-bottom: 2px solid var(--border); background: var(--surface); }
  .summary-title { font-size: 12px; font-weight: 700; color: var(--text); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
  .summary-title span { font-size: 10px; color: var(--muted); font-weight: 400; font-family: 'Share Tech Mono', monospace; }
  .summary-cards { display: flex; gap: 12px; }
  .summary-card { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; text-align: center; }
  .summary-card.total { border-color: var(--accent2); background: rgba(26,86,219,0.05); }
  .summary-card.done { border-color: var(--accent3); background: rgba(14,159,110,0.05); }
  .summary-card.pending { border-color: var(--warn); background: rgba(217,119,6,0.05); }
  .summary-label { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-bottom: 4px; }
  .summary-num { font-size: 32px; font-weight: 900; line-height: 1; }
  .summary-card.total .summary-num { color: var(--accent2); }
  .summary-card.done .summary-num { color: var(--accent3); }
  .summary-card.pending .summary-num { color: var(--warn); }
  .summary-unit { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* 월별 */
  .month-section { padding: 12px 28px; }
  .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-top: 10px; }
  .month-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 10px; text-align: center; }
  .month-card.current-month { border-color: var(--accent); background: var(--today-bg); }
  .month-name { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 3px; font-family: 'Share Tech Mono', monospace; }
  .month-name.current { color: var(--accent); }
  .month-count { font-size: 22px; font-weight: 900; color: var(--text); line-height: 1; }
  .month-count.current { color: var(--accent); }
  .month-unit { font-size: 9px; color: var(--muted); margin-top: 1px; }

  /* 하단 상태바 */
  .statusbar { padding: 8px 28px; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
  .live-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent3); display: inline-block; margin-right: 5px; animation: pulse 2s infinite; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px 10px; color: var(--muted); gap: 5px; }
  .empty-icon { font-size: 20px; opacity: 0.4; }
  .empty-text { font-size: 11px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 20px; color: var(--muted); font-size: 12px; }
  .spinner { width: 13px; height: 13px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<!-- 상단 헤더 -->
<div class="topbar">
  <div class="logo-area">
    <div class="logo-box">SME</div>
    <div>
      <div class="logo-title">SMEKOREA 출하 현황판</div>
      <div class="logo-sub">SHIPPING DISPLAY SYSTEM</div>
    </div>
  </div>
  <div class="topbar-right">
    <a class="input-btn" href="input.html">✚ 출하지시 입력</a>
    <div class="refresh-info" id="refreshCountdown">다음 갱신: 30초</div>
    <div style="text-align:right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-str" id="dateStr"></div>
    </div>
  </div>
</div>

<!-- 메인 2분할 -->
<div class="section-label"><div class="dot" style="background:var(--accent)"></div>오늘 출하 · 주간 일정</div>

<div class="main-grid">
  <!-- 오늘 출하 -->
  <div class="today-col">
    <div class="col-header">
      <div class="col-title-wrap"><div class="col-dot red-dot"></div><div class="col-title">오늘 출하</div></div>
      <div class="count-badge" id="todayCount">0건</div>
    </div>
    <div class="ship-cards" id="todayList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>

  <!-- 주간 요일 탭 -->
  <div class="week-col">
    <div class="week-tabs" id="weekTabs"></div>
    <div class="ship-cards week-content" id="weekList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>
</div>

<!-- 30일 요약 -->
<div class="section-label"><div class="dot" style="background:var(--accent2)"></div>향후 30일 출하 요약</div>
<div class="summary-section">
  <div class="summary-title">오늘부터 30일 <span id="summaryRange"></span></div>
  <div class="summary-cards">
    <div class="summary-card total"><div class="summary-label">TOTAL</div><div class="summary-num" id="sum30Total">-</div><div class="summary-unit">건</div></div>
    <div class="summary-card done"><div class="summary-label">완료</div><div class="summary-num" id="sum30Done">-</div><div class="summary-unit">건</div></div>
    <div class="summary-card pending"><div class="summary-label">대기</div><div class="summary-num" id="sum30Pending">-</div><div class="summary-unit">건</div></div>
  </div>
</div>

<!-- 월별 -->
<div class="section-label"><div class="dot" style="background:var(--accent2)"></div>월별 출하 건수</div>
<div class="month-section">
  <div class="month-grid" id="monthGrid"><div class="loading"><div class="spinner"></div></div></div>
</div>

<!-- 하단 상태바 -->
<div class="statusbar">
  <div><span class="live-dot"></span>실시간 연동 중 · Google Sheets</div>
  <div id="lastUpdate">마지막 갱신: -</div>
  <div>SMEKOREA Platform v1.3</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxA2KffEWK3E4lzHOYO3av-3U54FMKMgoOzCu9tYKJ-GPvdxZxr1pWIvM2-PnP_bhP-/exec';
  const DAYS = ['일','월','화','수','목','금','토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let allData = [];
  let selectedWeekDate = '';

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    const y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
    document.getElementById('dateStr').textContent = `${y}. ${mo}. ${d}. (${DAYS[now.getDay()]})`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function getLocalDateStr(offset) {
    const d = new Date();
    d.setDate(d.getDate() + (offset||0));
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }

  function getWeekDates() {
    const now = new Date();
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const d = new Date(now);
      d.setDate(now.getDate() + i);
      dates.push({
        dateStr: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
        dayName: DAYS[d.getDay()],
        display: String(d.getMonth()+1) + '/' + String(d.getDate())
      });
    }
    return dates;
  }

  function normalizeDate(val) {
    if (!val) return '';
    const s = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    try { const d = new Date(s); if (!isNaN(d)) return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'); } catch(e) {}
    return s;
  }

  function formatRegTime(val) {
    if (!val) return '-';
    const s = String(val).trim();
    // 이미 한국어 형식이면 그대로
    if (s.indexOf('2026') > -1 || s.indexOf('2025') > -1) {
      // 2026. 3. 30. PM 3:15:00 → 2026.03.30 15:15
      try {
        const d = new Date(s);
        if (!isNaN(d)) {
          return d.getFullYear() + '.' +
            String(d.getMonth()+1).padStart(2,'0') + '.' +
            String(d.getDate()).padStart(2,'0') + ' ' +
            String(d.getHours()).padStart(2,'0') + ':' +
            String(d.getMinutes()).padStart(2,'0');
        }
      } catch(e) {}
      return s;
    }
    return s;
  }

  function goEdit(row) {
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone] = row;
    const params = new URLSearchParams({
      edit: '1', shipDate: shipDate||'', customer: customer||'',
      note: note||'', inputBy: inputBy||'', manager: manager||'',
      arrivalTime: arrivalTime||'-', packDone: packDone||''
    });
    window.location.href = 'input.html?' + params.toString();
  }

  async function gasPost(data) {
    await fetch(SCRIPT_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    });
    await new Promise(r => setTimeout(r, 1500));
  }

  async function markComplete(shipDate, customer, manager) {
    try {
      await gasPost({ action: 'complete', shipDate, customer, manager });
      loadData();
    } catch(e) {}
  }

  function renderCard(row, type) {
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone, shipDone] = row;
    const isDone = shipDone === '완료';
    const deptClass = inputBy === '자재구매' ? 'tag-material' : 'tag-dev';
    const hasNote = note && note.trim() !== '' && note.trim() !== '-';
    const timeLabel = arrivalTime && arrivalTime !== '-' ? `🕐 ${arrivalTime}` : '';
    const packLabel = packDone && packDone !== '-' ? packDone : '';
    const safeCustomer = (customer||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const safeManager = (manager||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const regTimeStr = formatRegTime(regTime);

    return `
      <div class="ship-card ${type}-card${isDone?' done-card':''}">
        <div class="card-top">
          <div class="customer-name">${customer||'-'}</div>
          <div class="tags">
            <span class="tag ${deptClass}">${inputBy||'-'}</span>
            ${packLabel ? `<span class="tag tag-pack">${packLabel}</span>` : ''}
            ${isDone ? '<span class="tag tag-done">출하완료</span>' : ''}
          </div>
        </div>
        <div class="card-meta">
          <span>👤 ${manager||'-'}</span>
          ${timeLabel ? `<span>${timeLabel}</span>` : ''}
          <span>📝 ${regTimeStr}</span>
        </div>
        ${hasNote ? `<div class="note-text has-note">⚠ ${note}</div>` : ''}
        ${!isDone ? `
        <div class="card-actions">
          <button class="action-btn edit-btn" onclick="goEditRow(${JSON.stringify(JSON.stringify(row))})">✏ 수정</button>
          <button class="action-btn complete-btn" onclick="markComplete('${shipDate}','${safeCustomer}','${safeManager}')">출하 완료</button>
        </div>` : ''}
      </div>`;
  }

  function goEditRow(rowJson) {
    try {
      const row = JSON.parse(rowJson);
      goEdit(row);
    } catch(e) { console.error(e); }
  }

  function renderEmpty(msg) {
    return `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">${msg}</div></div>`;
  }

  function renderWeekContent(dateStr) {
    const rows = allData.filter(r => r[1] === dateStr);
    const todayStr = getLocalDateStr(0);
    const type = dateStr === todayStr ? 'today' : 'week';
    document.getElementById('weekList').innerHTML = rows.length > 0
      ? rows.map(r => renderCard(r, type)).join('')
      : renderEmpty('출하 일정 없음');
  }

  function buildWeekTabs(dataRows) {
    const todayStr = getLocalDateStr(0);
    const tomorrowStr = getLocalDateStr(1);
    const weekDates = getWeekDates();
    const tabsEl = document.getElementById('weekTabs');

    tabsEl.innerHTML = weekDates.map((w, i) => {
      const count = dataRows.filter(r => r[1] === w.dateStr).length;
      const isToday = w.dateStr === todayStr;
      const isTomorrow = w.dateStr === tomorrowStr;
      const cls = isToday ? 'week-tab today-tab' : isTomorrow ? 'week-tab tomorrow-tab' : 'week-tab';
      const label = isToday ? `오늘(${w.display})` : isTomorrow ? `내일(${w.display})` : `${w.dayName}(${w.display})`;
      return `<button class="${cls}" onclick="selectWeekTab('${w.dateStr}', this)">${label}${count>0?` <b>${count}</b>`:''}</button>`;
    }).join('');

    // 기본 선택: 오늘
    if (!selectedWeekDate) selectedWeekDate = todayStr;
    const tabs = tabsEl.querySelectorAll('.week-tab');
    tabs.forEach(t => {
      if (t.getAttribute('onclick').includes(selectedWeekDate)) {
        t.classList.add('active');
      }
    });
    renderWeekContent(selectedWeekDate);
  }

  function selectWeekTab(dateStr, el) {
    selectedWeekDate = dateStr;
    document.querySelectorAll('.week-tab').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
    renderWeekContent(dateStr);
  }

  async function loadData() {
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const rows = await res.json();
      allData = rows.slice(1).map(r => { r[1] = normalizeDate(r[1]); return r; });

      const todayStr = getLocalDateStr(0);
      const now = new Date(), currentYear = now.getFullYear(), currentMonth = now.getMonth();

      // 오늘 출하
      const todayRows = allData.filter(r => r[1] === todayStr);
      document.getElementById('todayCount').textContent = todayRows.length + '건';
      document.getElementById('todayList').innerHTML = todayRows.length > 0
        ? todayRows.map(r => renderCard(r, 'today')).join('') : renderEmpty('오늘 출하 일정 없음');

      // 주간 탭
      buildWeekTabs(allData);

      // 30일 요약
      const today30 = new Date(); today30.setHours(0,0,0,0);
      const end30 = new Date(today30); end30.setDate(today30.getDate() + 30);
      const range30 = allData.filter(r => {
        if (!r[1]) return false;
        const d = new Date(r[1]);
        return d >= today30 && d <= end30;
      });
      const done30 = range30.filter(r => r[8] === '완료').length;
      const pending30 = range30.length - done30;

      const startStr = String(now.getMonth()+1) + '/' + String(now.getDate()).padStart(2,'0');
      const endDate = new Date(now); endDate.setDate(now.getDate() + 30);
      const endStr = String(endDate.getMonth()+1) + '/' + String(endDate.getDate()).padStart(2,'0');
      document.getElementById('summaryRange').textContent = `(${startStr} ~ ${endStr})`;
      document.getElementById('sum30Total').textContent = range30.length;
      document.getElementById('sum30Done').textContent = done30;
      document.getElementById('sum30Pending').textContent = pending30;

      // 월별
      document.getElementById('monthGrid').innerHTML = MONTHS.map((mName, mi) => {
        const count = allData.filter(r => {
          if (!r[1]) return false;
          const d = new Date(r[1]);
          return d.getFullYear() === currentYear && d.getMonth() === mi;
        }).length;
        const isCurrent = mi === currentMonth;
        return `<div class="month-card ${isCurrent?'current-month':''}">
          <div class="month-name ${isCurrent?'current':''}">${mName}</div>
          <div class="month-count ${isCurrent?'current':''}">${count}</div>
          <div class="month-unit">건</div></div>`;
      }).join('');

      const t = new Date();
      document.getElementById('lastUpdate').textContent =
        `마지막 갱신: ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;

    } catch(err) {
      document.getElementById('todayList').innerHTML = renderEmpty('데이터 로딩 실패');
    }
  }

  let countdown = 30;
  loadData();
  setInterval(() => {
    countdown--;
    document.getElementById('refreshCountdown').textContent = `다음 갱신: ${countdown}초`;
    if (countdown <= 0) { countdown = 30; loadData(); }
  }, 1000);
</script>
</body>
</html>
