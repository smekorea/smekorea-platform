<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEKOREA 출하 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f0f4f9; --surface: #ffffff; --surface2: #e8eef6; --border: #cdd8ea;
    --accent: #c8001e; --accent2: #1a56db; --accent3: #0e9f6e;
    --text: #1a2233; --muted: #7a8baa; --warn: #d97706;
    --today-bg: rgba(200,0,30,0.05); --tomorrow-bg: rgba(26,86,219,0.05);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 32px; background: var(--surface);
    border-bottom: 2px solid var(--border); box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 10;
  }
  .logo-area { display: flex; align-items: center; gap: 14px; }
  .logo-box {
    width: 48px; height: 48px; background: var(--accent); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Share Tech Mono', monospace; font-size: 17px; font-weight: 900;
    color: #fff; letter-spacing: -1px; box-shadow: 0 3px 10px rgba(200,0,30,0.3);
  }
  .logo-title { font-size: 18px; font-weight: 700; }
  .logo-sub { font-size: 10px; color: var(--muted); font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; margin-top: 2px; }
  .clock { font-family: 'Share Tech Mono', monospace; font-size: 30px; color: var(--accent); letter-spacing: 3px; line-height: 1; }
  .date-str { font-size: 12px; color: var(--muted); margin-top: 3px; letter-spacing: 0.5px; text-align: right; }
  .refresh-info { font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }

  .section-label {
    display: flex; align-items: center; gap: 10px; padding: 8px 32px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    font-size: 11px; font-family: 'Share Tech Mono', monospace;
    letter-spacing: 3px; color: var(--muted); text-transform: uppercase;
  }
  .section-label .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .today-tomorrow { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 2px solid var(--border); }
  .day-col { padding: 16px 24px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  .day-col:last-child { border-right: none; }
  .day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .day-title-wrap { display: flex; align-items: center; gap: 10px; }
  .day-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .red-dot { background: var(--accent); box-shadow: 0 0 8px rgba(200,0,30,0.4); }
  .blue-dot { background: var(--accent2); box-shadow: 0 0 8px rgba(26,86,219,0.3); }
  .day-title { font-size: 16px; font-weight: 700; }
  .today-title { color: var(--accent); }
  .tomorrow-title { color: var(--accent2); }
  .count-badge { font-size: 11px; font-family: 'Share Tech Mono', monospace; background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 20px; color: var(--muted); }

  .ship-cards { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 280px; padding-right: 4px; }
  .ship-cards::-webkit-scrollbar { width: 4px; }
  .ship-cards::-webkit-scrollbar-track { background: var(--bg); border-radius: 2px; }
  .ship-cards::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .ship-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 12px 14px; display: flex; flex-direction: column; gap: 6px; animation: fadeIn 0.3s ease;
  }
  .ship-card.today-card { border-left: 3px solid var(--accent); background: var(--today-bg); }
  .ship-card.tomorrow-card { border-left: 3px solid var(--accent2); background: var(--tomorrow-bg); }
  .ship-card.done-card { opacity: 0.55; border-left-color: var(--accent3) !important; background: rgba(14,159,110,0.05) !important; }

  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .customer-name { font-size: 16px; font-weight: 700; }
  .done-card .customer-name { text-decoration: line-through; color: var(--muted); }

  .tags { display: flex; gap: 5px; align-items: center; flex-wrap: wrap; flex-shrink: 0; }
  .tag { font-size: 10px; font-family: 'Share Tech Mono', monospace; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
  .tag-material { background: rgba(200,0,30,0.1); color: var(--accent); border: 1px solid rgba(200,0,30,0.2); }
  .tag-dev { background: rgba(26,86,219,0.1); color: var(--accent2); border: 1px solid rgba(26,86,219,0.2); }
  .tag-pack { background: rgba(14,159,110,0.1); color: var(--accent3); border: 1px solid rgba(14,159,110,0.2); }
  .tag-done { background: rgba(14,159,110,0.15); color: var(--accent3); border: 1px solid rgba(14,159,110,0.3); }

  .card-meta { display: flex; gap: 12px; font-size: 11px; color: var(--muted); flex-wrap: wrap; }
  .note-text { font-size: 12px; color: var(--muted); padding-top: 5px; border-top: 1px solid var(--border); }
  .note-text.has-note { color: var(--warn); font-weight: 500; }

  .card-actions { display: flex; gap: 6px; margin-top: 4px; }
  .action-btn {
    padding: 5px 12px; border-radius: 6px; font-family: 'Noto Sans KR', sans-serif;
    font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: 1px solid;
  }
  .complete-btn { background: var(--surface2); border-color: var(--border); color: var(--muted); }
  .complete-btn:hover { background: var(--accent3); color: #fff; border-color: var(--accent3); }
  .edit-btn { background: var(--surface2); border-color: var(--border); color: var(--accent2); }
  .edit-btn:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  .week-section { padding: 16px 24px; border-bottom: 2px solid var(--border); }
  .week-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 12px; }
  .week-day { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; min-height: 80px; }
  .week-day.is-today { border-color: var(--accent); background: var(--today-bg); }
  .week-day.is-tomorrow { border-color: var(--accent2); background: var(--tomorrow-bg); }
  .week-day-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; padding-bottom: 5px; border-bottom: 1px solid var(--border); }
  .week-day-name { font-size: 11px; font-weight: 700; color: var(--muted); }
  .week-day-name.today-name { color: var(--accent); }
  .week-day-name.tomorrow-name { color: var(--accent2); }
  .week-day-date { font-size: 10px; font-family: 'Share Tech Mono', monospace; color: var(--muted); }
  .week-item { font-size: 11px; font-weight: 600; color: var(--text); padding: 2px 0; border-bottom: 1px dashed var(--border); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .week-item:last-child { border-bottom: none; }
  .week-empty { font-size: 11px; color: var(--muted); text-align: center; padding-top: 6px; }

  .month-section { padding: 16px 24px; }
  .month-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 10px; margin-top: 12px; }
  .month-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
  .month-card.current-month { border-color: var(--accent); background: var(--today-bg); }
  .month-name { font-size: 10px; font-weight: 700; color: var(--muted); margin-bottom: 4px; font-family: 'Share Tech Mono', monospace; }
  .month-name.current { color: var(--accent); }
  .month-count { font-size: 26px; font-weight: 900; color: var(--text); line-height: 1; }
  .month-count.current { color: var(--accent); }
  .month-unit { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .statusbar { padding: 10px 32px; border-top: 1px solid var(--border); background: var(--surface); display: flex; align-items: center; justify-content: space-between; font-size: 11px; color: var(--muted); font-family: 'Share Tech Mono', monospace; }
  .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); display: inline-block; margin-right: 6px; animation: pulse 2s infinite; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px 10px; color: var(--muted); gap: 6px; }
  .empty-icon { font-size: 24px; opacity: 0.4; }
  .empty-text { font-size: 12px; }
  .loading { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 24px; color: var(--muted); font-size: 13px; }
  .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }

  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-area">
    <div class="logo-box">SME</div>
    <div>
      <div class="logo-title">SMEKOREA 출하 현황판</div>
      <div class="logo-sub">SHIPPING DISPLAY SYSTEM</div>
    </div>
  </div>
  <div class="refresh-info" id="refreshCountdown">다음 갱신: 30초</div>
  <div style="text-align:right">
    <div class="clock" id="clock">--:--:--</div>
    <div class="date-str" id="dateStr"></div>
  </div>
</div>

<div class="section-label"><div class="dot" style="background:var(--accent)"></div>오늘 · 내일 출하 현황</div>

<div class="today-tomorrow">
  <div class="day-col">
    <div class="day-header">
      <div class="day-title-wrap"><div class="day-dot red-dot"></div><div class="day-title today-title">오늘 출하</div></div>
      <div class="count-badge" id="todayCount">0건</div>
    </div>
    <div class="ship-cards" id="todayList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>
  <div class="day-col">
    <div class="day-header">
      <div class="day-title-wrap"><div class="day-dot blue-dot"></div><div class="day-title tomorrow-title">내일 출하</div></div>
      <div class="count-badge" id="tomorrowCount">0건</div>
    </div>
    <div class="ship-cards" id="tomorrowList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>
</div>

<div class="section-label"><div class="dot" style="background:var(--accent3)"></div>이번주 출하 일정 (월 – 금)</div>
<div class="week-section"><div class="week-grid" id="weekGrid"><div class="loading"><div class="spinner"></div></div></div></div>

<div class="section-label"><div class="dot" style="background:var(--accent2)"></div>월별 출하 건수 요약</div>
<div class="month-section"><div class="month-grid" id="monthGrid"><div class="loading"><div class="spinner"></div></div></div></div>

<div class="statusbar">
  <div><span class="live-dot"></span>실시간 연동 중 · Google Sheets</div>
  <div id="lastUpdate">마지막 갱신: -</div>
  <div>SMEKOREA Platform v1.2</div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxA2KffEWK3E4lzHOYO3av-3U54FMKMgoOzCu9tYKJ-GPvdxZxr1pWIvM2-PnP_bhP-/exec';
  const DAYS = ['일','월','화','수','목','금','토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    document.getElementById('clock').textContent = `${h}:${m}:${s}`;
    const y = now.getFullYear(), mo = String(now.getMonth()+1).padStart(2,'0'), d = String(now.getDate()).padStart(2,'0');
    document.getElementById('dateStr').textContent = `${y}. ${mo}. ${d}. (${DAYS[now.getDay()]})`;
  }
  setInterval(updateClock, 1000);
  updateClock();

  function getDateStr(offset) {
    const d = new Date();
    d.setDate(d.getDate() + offset);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + day;
  }

  function getWeekDates() {
    const now = new Date(), day = now.getDay();
    const mon = new Date(now);
    mon.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
    return Array.from({length:5}, (_, i) => {
      const d = new Date(mon); d.setDate(mon.getDate() + i);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + dd;
    });
  }

  function normalizeDate(val) {
    if (!val) return '';
    const s = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    if (/^\d+$/.test(s)) {
      const d = new Date(Math.round((Number(s) - 25569) * 86400 * 1000));
      return d.toISOString().split('T')[0];
    }
    try { const d = new Date(s); if (!isNaN(d)) return d.toISOString().split('T')[0]; } catch(e) {}
    return s;
  }

  function goEdit(row) {
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone] = row;
    const params = new URLSearchParams({
      edit: '1', shipDate, customer, note: note||'',
      inputBy: inputBy||'', manager: manager||'',
      arrivalTime: arrivalTime||'-', packDone: packDone||''
    });
    window.location.href = 'input.html?' + params.toString();
  }

  async function markComplete(shipDate, customer, manager) {
    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ action: 'complete', shipDate, customer, manager })
      });
      setTimeout(loadData, 1000);
    } catch(e) {}
  }

  function renderCard(row, type) {
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone, shipDone] = row;
    const isDone = shipDone === '완료';
    const deptClass = inputBy === '자재구매' ? 'tag-material' : 'tag-dev';
    const hasNote = note && note.trim() !== '' && note !== '-';
    const timeLabel = arrivalTime && arrivalTime !== '-' ? `🕐 ${arrivalTime}` : '';
    const packLabel = packDone && packDone !== '-' ? packDone : '';
    const idx = `'${shipDate}','${(customer||'').replace(/'/g,"\\'")}','${(manager||'').replace(/'/g,"\\'")}'`;

    return `
      <div class="ship-card ${type}-card${isDone?' done-card':''}">
        <div class="card-top">
          <div class="customer-name">${customer||'-'}</div>
          <div class="tags">
            <span class="tag ${deptClass}">${inputBy||'-'}</span>
            ${packLabel ? `<span class="tag tag-pack">${packLabel}</span>` : ''}
            ${isDone ? '<span class="tag tag-done">출하완료</span>' : ''}
          </div>
        </div>
        <div class="card-meta">
          <span>👤 ${manager||'-'}</span>
          ${timeLabel ? `<span>${timeLabel}</span>` : ''}
        </div>
        ${hasNote ? `<div class="note-text has-note">⚠ ${note}</div>` : ''}
        ${!isDone ? `
        <div class="card-actions">
          <button class="action-btn edit-btn" onclick="goEdit(${JSON.stringify(row)})">✏ 수정</button>
          <button class="action-btn complete-btn" onclick="markComplete(${idx})">출하 완료</button>
        </div>` : ''}
      </div>`;
  }

  function renderEmpty(msg) {
    return `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">${msg}</div></div>`;
  }

  async function loadData() {
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const rows = await res.json();
      const dataRows = rows.slice(1).map(r => { r[1] = normalizeDate(r[1]); return r; });

      const todayStr = getDateStr(0), tomorrowStr = getDateStr(1);
      const weekDates = getWeekDates();
      const now = new Date(), currentYear = now.getFullYear(), currentMonth = now.getMonth();

      const todayRows = dataRows.filter(r => r[1] === todayStr);
      const tomorrowRows = dataRows.filter(r => r[1] === tomorrowStr);

      document.getElementById('todayCount').textContent = todayRows.length + '건';
      document.getElementById('tomorrowCount').textContent = tomorrowRows.length + '건';
      document.getElementById('todayList').innerHTML = todayRows.length > 0
        ? todayRows.map(r => renderCard(r, 'today')).join('') : renderEmpty('오늘 출하 일정 없음');
      document.getElementById('tomorrowList').innerHTML = tomorrowRows.length > 0
        ? tomorrowRows.map(r => renderCard(r, 'tomorrow')).join('') : renderEmpty('내일 출하 일정 없음');

      const dayNames = ['월','화','수','목','금'];
      document.getElementById('weekGrid').innerHTML = weekDates.map((dateStr, i) => {
        const isToday = dateStr === todayStr, isTomorrow = dateStr === tomorrowStr;
        const items = dataRows.filter(r => r[1] === dateStr);
        const cls = isToday ? 'week-day is-today' : isTomorrow ? 'week-day is-tomorrow' : 'week-day';
        const nameCls = isToday ? 'week-day-name today-name' : isTomorrow ? 'week-day-name tomorrow-name' : 'week-day-name';
        const dateLabel = dateStr.slice(5).replace('-', '/');
        const itemsHtml = items.length > 0
          ? items.map(r => `<div class="week-item">${r[8]==='완료'?'✓ ':''} ${r[2]||'-'}</div>`).join('')
          : `<div class="week-empty">-</div>`;
        return `<div class="${cls}">
          <div class="week-day-header">
            <div class="${nameCls}">${dayNames[i]}${isToday?' (오늘)':isTomorrow?' (내일)':''}</div>
            <div class="week-day-date">${dateLabel}</div>
          </div>${itemsHtml}</div>`;
      }).join('');

      document.getElementById('monthGrid').innerHTML = MONTHS.map((mName, mi) => {
        const count = dataRows.filter(r => {
          if (!r[1]) return false;
          const d = new Date(r[1]);
          return d.getFullYear() === currentYear && d.getMonth() === mi;
        }).length;
        const isCurrent = mi === currentMonth;
        return `<div class="month-card ${isCurrent?'current-month':''}">
          <div class="month-name ${isCurrent?'current':''}">${mName}</div>
          <div class="month-count ${isCurrent?'current':''}">${count}</div>
          <div class="month-unit">건</div></div>`;
      }).join('');

      const t = new Date();
      document.getElementById('lastUpdate').textContent =
        `마지막 갱신: ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;

    } catch(err) {
      document.getElementById('todayList').innerHTML = renderEmpty('데이터 로딩 실패');
      document.getElementById('tomorrowList').innerHTML = renderEmpty('데이터 로딩 실패');
    }
  }

  let countdown = 30;
  loadData();
  setInterval(() => {
    countdown--;
    document.getElementById('refreshCountdown').textContent = `다음 갱신: ${countdown}초`;
    if (countdown <= 0) { countdown = 30; loadData(); }
  }, 1000);
</script>
</body>
</html>
