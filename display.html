<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMEKOREA 출하 현황판</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f0f4f9;--surface:#fff;--surface2:#e8eef6;--border:#cdd8ea;
    --accent:#c8001e;--accent2:#1a56db;--accent3:#0e9f6e;
    --text:#1a2233;--muted:#7a8baa;--warn:#d97706;
    --today-bg:rgba(200,0,30,0.05);--week-bg:rgba(26,86,219,0.05);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;}

  .topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 24px;background:var(--surface);border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,0.06);position:sticky;top:0;z-index:10;}
  .logo-area{display:flex;align-items:center;gap:12px;}
  .logo-box{width:40px;height:40px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:14px;font-weight:900;color:#fff;letter-spacing:-1px;box-shadow:0 3px 10px rgba(200,0,30,0.3);}
  .logo-title{font-size:15px;font-weight:700;}
  .logo-sub{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:2px;margin-top:1px;}
  .topbar-right{display:flex;align-items:center;gap:12px;}
  .input-btn{display:flex;align-items:center;gap:5px;padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;text-decoration:none;transition:background 0.2s;box-shadow:0 2px 8px rgba(200,0,30,0.3);}
  .input-btn:hover{background:#a80019;}
  .clock{font-family:'Share Tech Mono',monospace;font-size:24px;color:var(--accent);letter-spacing:2px;line-height:1;}
  .date-str{font-size:10px;color:var(--muted);margin-top:2px;text-align:right;}
  .refresh-info{font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;}

  .sec-label{display:flex;align-items:center;gap:8px;padding:6px 24px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:9px;font-family:'Share Tech Mono',monospace;letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
  .sec-label .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}

  .main-grid{display:grid;grid-template-columns:1fr 1fr;border-bottom:2px solid var(--border);}
  .col-panel{padding:12px 18px;display:flex;flex-direction:column;}
  .col-panel:first-child{border-right:1px solid var(--border);}
  .col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:7px;border-bottom:1px solid var(--border);}
  .col-title-wrap{display:flex;align-items:center;gap:7px;}
  .col-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .col-title{font-size:14px;font-weight:700;}
  .today-title{color:var(--accent);}
  .week-title{color:var(--accent2);}
  .col-date{font-size:11px;font-weight:600;color:var(--accent2);font-family:'Share Tech Mono',monospace;}
  .count-badge{font-size:9px;font-family:'Share Tech Mono',monospace;background:var(--surface2);border:1px solid var(--border);padding:2px 7px;border-radius:20px;color:var(--muted);}

  .ship-cards{display:flex;flex-direction:column;gap:6px;overflow-y:auto;max-height:250px;padding-right:3px;}
  .ship-cards::-webkit-scrollbar{width:3px;}
  .ship-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .ship-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px 11px;display:flex;flex-direction:column;gap:4px;animation:fadeIn 0.3s ease;position:relative;}
  .ship-card.today-card{border-left:3px solid var(--accent);background:var(--today-bg);}
  .ship-card.week-card{border-left:3px solid var(--accent2);background:var(--week-bg);}
  .ship-card.done-card{opacity:0.7;border-left-color:var(--accent3)!important;background:rgba(14,159,110,0.07)!important;border-color:var(--accent3)!important;}
  .ship-card.edited-card{border-top:2px solid var(--warn)!important;}

  .card-top{display:flex;align-items:center;justify-content:space-between;gap:6px;}
  .customer-name{font-size:14px;font-weight:700;}
  .done-card .customer-name{text-decoration:line-through;color:var(--accent3);}
  .tags{display:flex;gap:3px;align-items:center;flex-wrap:wrap;flex-shrink:0;}
  .tag{font-size:9px;font-family:'Share Tech Mono',monospace;padding:2px 6px;border-radius:3px;white-space:nowrap;}
  .tag-m{background:rgba(200,0,30,0.1);color:var(--accent);border:1px solid rgba(200,0,30,0.2);}
  .tag-d{background:rgba(26,86,219,0.1);color:var(--accent2);border:1px solid rgba(26,86,219,0.2);}
  .tag-p{background:rgba(14,159,110,0.1);color:var(--accent3);border:1px solid rgba(14,159,110,0.2);}
  .tag-done{background:rgba(14,159,110,0.15);color:var(--accent3);border:1px solid rgba(14,159,110,0.3);}
  .tag-edited{background:rgba(217,119,6,0.15);color:var(--warn);border:1px solid rgba(217,119,6,0.3);}
  .card-meta{display:flex;gap:8px;font-size:10px;color:var(--muted);flex-wrap:wrap;}
  .note-text{font-size:10px;color:var(--muted);padding-top:4px;border-top:1px solid var(--border);}
  .note-text.has-note{color:var(--warn);font-weight:500;}
  .edit-history{font-size:9px;color:var(--warn);padding-top:3px;border-top:1px dashed rgba(217,119,6,0.3);}
  .card-actions{display:flex;gap:4px;margin-top:3px;}
  .action-btn{padding:3px 9px;border-radius:4px;font-family:'Noto Sans KR',sans-serif;font-size:10px;font-weight:600;cursor:pointer;transition:all 0.2s;border:1px solid;}
  .complete-btn{background:var(--surface2);border-color:var(--border);color:var(--muted);}
  .complete-btn:hover{background:var(--accent3);color:#fff;border-color:var(--accent3);}
  .edit-btn{background:var(--surface2);border-color:rgba(200,0,30,0.3);color:var(--accent);}
  .edit-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

  /* 주간 요일 그리드 */
  .week-grid-section{padding:10px 24px;border-bottom:2px solid var(--border);background:var(--surface);}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
  .week-day{border:1px solid var(--border);border-radius:7px;padding:7px 6px;cursor:pointer;transition:all 0.15s;background:var(--surface);}
  .week-day:hover{border-color:var(--accent2);background:var(--week-bg);}
  .week-day.active{border-color:var(--accent2);background:var(--week-bg);box-shadow:0 0 0 2px rgba(26,86,219,0.15);}
  .week-day.is-today{border-color:var(--accent);background:var(--today-bg);}
  .week-day.is-today.active{box-shadow:0 0 0 2px rgba(200,0,30,0.15);}
  .week-day.is-tomorrow{border-color:var(--accent2);background:var(--week-bg);}
  .week-day-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);}
  .week-day-name{font-size:10px;font-weight:700;color:var(--muted);}
  .week-day-name.today-name{color:var(--accent);}
  .week-day-name.tomorrow-name{color:var(--accent2);}
  .week-day-date{font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--muted);}
  .week-item{font-size:10px;font-weight:600;color:var(--text);padding:1px 0;border-bottom:1px dashed var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .week-item:last-child{border-bottom:none;}
  .week-empty{font-size:10px;color:var(--muted);text-align:center;padding-top:4px;}

  /* 30일 일별 요약 */
  .summary-section{padding:10px 24px;border-bottom:2px solid var(--border);background:var(--surface);}
  .summary-title{font-size:11px;font-weight:700;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
  .summary-title span{font-size:9px;color:var(--muted);font-weight:400;font-family:'Share Tech Mono',monospace;}
  .day-summary-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:4px;}
  .day-sum-card{border:1px solid var(--border);border-radius:5px;padding:5px 4px;text-align:center;background:var(--surface2);}
  .day-sum-card.has-data{border-color:var(--accent2);background:rgba(26,86,219,0.06);}
  .day-sum-card.is-today{border-color:var(--accent);background:var(--today-bg);}
  .day-sum-date{font-size:8px;color:var(--muted);font-family:'Share Tech Mono',monospace;margin-bottom:2px;}
  .day-sum-date.today-date{color:var(--accent);font-weight:700;}
  .day-sum-count{font-size:13px;font-weight:700;color:var(--text);line-height:1;}
  .day-sum-card.has-data .day-sum-count{color:var(--accent2);}
  .day-sum-card.is-today .day-sum-count{color:var(--accent);}
  .day-sum-done{font-size:8px;color:var(--accent3);}

  /* 월별 */
  .month-section{padding:10px 24px;}
  .month-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
  .month-card{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:9px;text-align:center;}
  .month-card.current-month{border-color:var(--accent);background:var(--today-bg);}
  .month-name{font-size:9px;font-weight:700;color:var(--muted);margin-bottom:3px;font-family:'Share Tech Mono',monospace;}
  .month-name.current{color:var(--accent);}
  .month-count{font-size:20px;font-weight:900;color:var(--text);line-height:1;}
  .month-count.current{color:var(--accent);}
  .month-unit{font-size:9px;color:var(--muted);margin-top:1px;}

  .statusbar{padding:7px 24px;border-top:1px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:space-between;font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
  .live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent3);display:inline-block;margin-right:5px;animation:pulse 2s infinite;}

  .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:18px 10px;color:var(--muted);gap:4px;}
  .empty-icon{font-size:18px;opacity:0.4;}
  .empty-text{font-size:11px;}
  .loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px;color:var(--muted);font-size:11px;}
  .spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}

  /* 수정 모달 */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;}
  .modal-overlay.show{display:flex;}
  .modal{background:var(--surface);border-radius:12px;width:480px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);}
  .modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:2px solid var(--border);}
  .modal-title{font-size:15px;font-weight:700;color:var(--accent);display:flex;align-items:center;gap:8px;}
  .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:4px;}
  .modal-close:hover{color:var(--text);}
  .modal-body{padding:20px;}
  .modal-section{margin-bottom:16px;}
  .modal-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;padding-bottom:5px;border-bottom:1px solid var(--border);}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
  .form-group{display:flex;flex-direction:column;gap:4px;}
  .form-group.full{grid-column:1/-1;}
  .form-label{font-size:10px;font-weight:600;color:var(--muted);}
  .form-input{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);background:var(--surface);transition:border-color 0.2s;}
  .form-input:focus{outline:none;border-color:var(--accent2);}
  .form-select{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);background:var(--surface);}
  .form-select:focus{outline:none;border-color:var(--accent2);}
  .form-textarea{padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-family:'Noto Sans KR',sans-serif;font-size:12px;color:var(--text);background:var(--surface);resize:vertical;min-height:60px;}
  .form-textarea:focus{outline:none;border-color:var(--accent2);}
  .reason-input{border-color:rgba(200,0,30,0.4)!important;}
  .reason-input:focus{border-color:var(--accent)!important;}
  .modal-footer{display:flex;gap:8px;padding:16px 20px;border-top:1px solid var(--border);justify-content:flex-end;}
  .modal-btn{padding:8px 20px;border-radius:7px;font-family:'Noto Sans KR',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;border:1px solid;}
  .modal-btn-cancel{background:var(--surface2);border-color:var(--border);color:var(--muted);}
  .modal-btn-cancel:hover{background:var(--border);}
  .modal-btn-save{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(200,0,30,0.3);}
  .modal-btn-save:hover{background:#a80019;}
  .modal-btn-save:disabled{background:var(--border);border-color:var(--border);color:var(--muted);cursor:not-allowed;box-shadow:none;}
  .orig-info{background:var(--surface2);border-radius:6px;padding:10px 12px;font-size:10px;color:var(--muted);margin-bottom:12px;}
  .orig-row{display:flex;gap:8px;margin-bottom:3px;}
  .orig-label{font-weight:600;min-width:60px;}

  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
  @keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-area">
    <div class="logo-box">SME</div>
    <div>
      <div class="logo-title">SMEKOREA 출하 현황판</div>
      <div class="logo-sub">SHIPPING DISPLAY SYSTEM</div>
    </div>
  </div>
  <div class="topbar-right">
    <a class="input-btn" href="input.html">✚ 출하지시 입력</a>
    <div class="refresh-info" id="refreshCountdown">다음 갱신: 30초</div>
    <div style="text-align:right">
      <div class="clock" id="clock">--:--:--</div>
      <div class="date-str" id="dateStr"></div>
    </div>
  </div>
</div>

<div class="sec-label"><div class="dot" style="background:var(--accent)"></div>오늘 출하 · 선택 요일 상세</div>

<div class="main-grid">
  <div class="col-panel">
    <div class="col-header">
      <div class="col-title-wrap"><div class="col-dot" style="background:var(--accent);box-shadow:0 0 6px rgba(200,0,30,0.4)"></div><div class="col-title today-title">오늘 출하</div></div>
      <div class="count-badge" id="todayCount">0건</div>
    </div>
    <div class="ship-cards" id="todayList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>
  <div class="col-panel">
    <div class="col-header">
      <div class="col-title-wrap"><div class="col-dot" style="background:var(--accent2);box-shadow:0 0 6px rgba(26,86,219,0.3)"></div><div class="col-title week-title">선택 요일 출하</div></div>
      <div style="display:flex;align-items:center;gap:8px;">
        <div class="col-date" id="selectedDateLabel">-</div>
        <div class="count-badge" id="weekCount">0건</div>
      </div>
    </div>
    <div class="ship-cards" id="weekList"><div class="loading"><div class="spinner"></div> 불러오는 중...</div></div>
  </div>
</div>

<div class="sec-label"><div class="dot" style="background:var(--accent3)"></div>이번주 출하 일정 (월 – 일) · 클릭하면 우측에 상세 표시</div>
<div class="week-grid-section">
  <div class="week-grid" id="weekGrid"></div>
</div>

<div class="sec-label"><div class="dot" style="background:var(--accent2)"></div>향후 30일 일별 출하 현황</div>
<div class="summary-section">
  <div class="summary-title">오늘부터 30일 <span id="summaryRange"></span></div>
  <div class="day-summary-grid" id="daySummaryGrid"></div>
</div>

<div class="sec-label"><div class="dot" style="background:var(--accent2)"></div>월별 출하 건수</div>
<div class="month-section">
  <div class="month-grid" id="monthGrid"><div class="loading"><div class="spinner"></div></div></div>
</div>

<div class="statusbar">
  <div><span class="live-dot"></span>실시간 연동 중 · Google Sheets</div>
  <div id="lastUpdate">마지막 갱신: -</div>
  <div>SMEKOREA Platform v1.4</div>
</div>

<!-- 수정 모달 -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">✏ 출하지시 수정</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <!-- 원본 정보 -->
      <div class="modal-section">
        <div class="modal-section-title">현재 등록 내역</div>
        <div class="orig-info" id="origInfo"></div>
      </div>

      <!-- 수정 항목 -->
      <div class="modal-section">
        <div class="modal-section-title">수정 내용</div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">출하일자</label>
            <input type="date" class="form-input" id="editShipDate">
          </div>
          <div class="form-group">
            <label class="form-label">매출처명</label>
            <input type="text" class="form-input" id="editCustomer" placeholder="매출처명">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">담당자</label>
            <input type="text" class="form-input" id="editManager" placeholder="담당자">
          </div>
          <div class="form-group">
            <label class="form-label">도착시간</label>
            <input type="text" class="form-input" id="editArrivalTime" placeholder="예: 14:00">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">입력부서</label>
            <select class="form-select" id="editInputBy">
              <option value="자재구매">자재구매</option>
              <option value="개발구매">개발구매</option>
              <option value="영업">영업</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">포장완료</label>
            <select class="form-select" id="editPackDone">
              <option value="-">-</option>
              <option value="1PL">1PL</option>
              <option value="2PL">2PL</option>
              <option value="3PL">3PL</option>
              <option value="1BOX">1BOX</option>
              <option value="2BOX">2BOX</option>
              <option value="3BOX">3BOX</option>
              <option value="4BOX">4BOX</option>
              <option value="5BOX">5BOX</option>
              <option value="0PL">0PL</option>
              <option value="5PL">5PL</option>
              <option value="7BOX">7BOX</option>
            </select>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group full">
            <label class="form-label">비고</label>
            <textarea class="form-textarea" id="editNote" placeholder="비고사항"></textarea>
          </div>
        </div>
      </div>

      <!-- 수정 이력 -->
      <div class="modal-section">
        <div class="modal-section-title">수정 이력 기록 <span style="color:var(--accent);font-size:9px;">(필수)</span></div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">수정자</label>
            <input type="text" class="form-input reason-input" id="editBy" placeholder="수정자 이름">
          </div>
          <div class="form-group">
            <label class="form-label">수정사유</label>
            <input type="text" class="form-input reason-input" id="editReason" placeholder="수정 사유 입력">
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-cancel" onclick="closeEditModal()">취소</button>
      <button class="modal-btn modal-btn-save" id="saveEditBtn" onclick="saveEdit()">수정 저장</button>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxA2KffEWK3E4lzHOYO3av-3U54FMKMgoOzCu9tYKJ-GPvdxZxr1pWIvM2-PnP_bhP-/exec';
  const DAYS = ['일','월','화','수','목','금','토'];
  const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  let allData = [];
  let selectedDate = '';
  let editTargetRow = null;
  let editTargetIdx = -1;

  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent =
      String(now.getHours()).padStart(2,'0') + ':' +
      String(now.getMinutes()).padStart(2,'0') + ':' +
      String(now.getSeconds()).padStart(2,'0');
    document.getElementById('dateStr').textContent =
      now.getFullYear() + '. ' +
      String(now.getMonth()+1).padStart(2,'0') + '. ' +
      String(now.getDate()).padStart(2,'0') + '. (' + DAYS[now.getDay()] + ')';
  }
  setInterval(updateClock, 1000);
  updateClock();

  function getLocalDate(offset) {
    const d = new Date();
    d.setDate(d.getDate() + (offset||0));
    return {
      str: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
      label: d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0') + ' (' + DAYS[d.getDay()] + ')',
      dayName: DAYS[d.getDay()],
      display: String(d.getMonth()+1) + '/' + String(d.getDate()),
      date: d
    };
  }

  function normalizeDate(val) {
    if (!val) return '';
    const s = String(val).trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    try {
      const d = new Date(s);
      if (!isNaN(d) && d.getFullYear() > 2000)
        return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    } catch(e) {}
    return s;
  }

  function formatRegTime(val) {
    if (!val) return '-';
    const s = String(val).trim();
    if (s.indexOf('1899') > -1 || (s.indexOf('T') > -1 && s.indexOf('Z') > -1)) return '-';
    try {
      const d = new Date(s);
      if (!isNaN(d) && d.getFullYear() > 2000) {
        return d.getFullYear() + '.' +
          String(d.getMonth()+1).padStart(2,'0') + '.' +
          String(d.getDate()).padStart(2,'0') + ' ' +
          String(d.getHours()).padStart(2,'0') + ':' +
          String(d.getMinutes()).padStart(2,'0');
      }
    } catch(e) {}
    return s;
  }

  // 수정 모달 열기
  function openEditModal(idx) {
    editTargetIdx = idx;
    editTargetRow = allData[idx];
    const row = editTargetRow;
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone, shipDone, editTime, editBy, editReason] = row;

    // 원본 정보 표시
    document.getElementById('origInfo').innerHTML = `
      <div class="orig-row"><span class="orig-label">등록일시</span><span>${formatRegTime(regTime)}</span></div>
      <div class="orig-row"><span class="orig-label">출하일자</span><span>${shipDate||'-'}</span></div>
      <div class="orig-row"><span class="orig-label">매출처명</span><span>${customer||'-'}</span></div>
      <div class="orig-row"><span class="orig-label">담당자</span><span>${manager||'-'}</span></div>
      <div class="orig-row"><span class="orig-label">도착시간</span><span>${arrivalTime||'-'}</span></div>
      <div class="orig-row"><span class="orig-label">포장완료</span><span>${packDone||'-'}</span></div>
      ${note ? `<div class="orig-row"><span class="orig-label">비고</span><span>${note}</span></div>` : ''}
      ${editTime ? `<div class="orig-row" style="color:var(--warn)"><span class="orig-label">최근수정</span><span>${formatRegTime(editTime)} / ${editBy||''} / ${editReason||''}</span></div>` : ''}
    `;

    // 폼에 현재값 채우기
    document.getElementById('editShipDate').value = shipDate || '';
    document.getElementById('editCustomer').value = customer || '';
    document.getElementById('editManager').value = manager || '';
    document.getElementById('editArrivalTime').value = (arrivalTime && arrivalTime !== '-') ? arrivalTime : '';
    document.getElementById('editInputBy').value = inputBy || '자재구매';
    document.getElementById('editPackDone').value = (packDone && packDone !== '-') ? packDone : '-';
    document.getElementById('editNote').value = (note && note !== '-') ? note : '';
    document.getElementById('editBy').value = '';
    document.getElementById('editReason').value = '';

    document.getElementById('editModal').classList.add('show');
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.remove('show');
    editTargetRow = null;
    editTargetIdx = -1;
  }

  async function saveEdit() {
    const editBy = document.getElementById('editBy').value.trim();
    const editReason = document.getElementById('editReason').value.trim();

    if (!editBy) { alert('수정자를 입력해주세요.'); return; }
    if (!editReason) { alert('수정사유를 입력해주세요.'); return; }

    const btn = document.getElementById('saveEditBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';

    const origRow = editTargetRow;
    const newData = {
      action: 'edit',
      origRegTime: origRow[0],
      origShipDate: origRow[1],
      origCustomer: origRow[2],
      shipDate: document.getElementById('editShipDate').value,
      customer: document.getElementById('editCustomer').value.trim(),
      note: document.getElementById('editNote').value.trim(),
      inputBy: document.getElementById('editInputBy').value,
      manager: document.getElementById('editManager').value.trim(),
      arrivalTime: document.getElementById('editArrivalTime').value.trim() || '-',
      packDone: document.getElementById('editPackDone').value,
      editBy: editBy,
      editReason: editReason
    };

    try {
      await fetch(SCRIPT_URL, {
        method: 'POST', mode: 'no-cors',
        headers: {'Content-Type': 'text/plain'},
        body: JSON.stringify(newData)
      });
      await new Promise(r => setTimeout(r, 1500));
      closeEditModal();
      loadData();
    } catch(e) {
      alert('저장 중 오류가 발생했습니다.');
    } finally {
      btn.disabled = false;
      btn.textContent = '수정 저장';
    }
  }

  async function gasPost(data) {
    await fetch(SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify(data)
    });
    await new Promise(r => setTimeout(r, 1500));
  }

  async function markComplete(shipDate, customer, manager) {
    try {
      await gasPost({action:'complete', shipDate, customer, manager});
      loadData();
    } catch(e) {}
  }

  function renderCard(row, type) {
    const [regTime, shipDate, customer, note, inputBy, manager, arrivalTime, packDone, shipDone, editTime, editBy, editReason] = row;
    const isDone = shipDone === '완료';
    const isEdited = editTime && String(editTime).trim() !== '';
    const deptClass = inputBy === '자재구매' ? 'tag-m' : 'tag-d';
    const hasNote = note && note.trim() !== '' && note.trim() !== '-';
    const timeLabel = arrivalTime && arrivalTime !== '-' ? `🕐 ${arrivalTime}` : '';
    const packLabel = packDone && packDone !== '-' ? packDone : '';
    const regStr = formatRegTime(regTime);
    const idx = allData.indexOf(row);

    return `<div class="ship-card ${type}-card${isDone?' done-card':''}${isEdited?' edited-card':''}">
      <div class="card-top">
        <div class="customer-name">${customer||'-'}</div>
        <div class="tags">
          <span class="tag ${deptClass}">${inputBy||'-'}</span>
          ${packLabel?`<span class="tag tag-p">${packLabel}</span>`:''}
          ${isEdited?'<span class="tag tag-edited">✎ 수정됨</span>':''}
          ${isDone?'<span class="tag tag-done">출하완료</span>':''}
        </div>
      </div>
      <div class="card-meta">
        <span>👤 ${manager||'-'}</span>
        ${timeLabel?`<span>${timeLabel}</span>`:''}
        ${regStr!=='-'?`<span>📝 ${regStr}</span>`:''}
      </div>
      ${hasNote?`<div class="note-text has-note">⚠ ${note}</div>`:''}
      ${isEdited?`<div class="edit-history">✎ ${formatRegTime(editTime)} · ${editBy||''} · ${editReason||''}</div>`:''}
      ${!isDone?`<div class="card-actions">
        <button class="action-btn edit-btn" onclick="openEditModal(${idx})">✏ 수정</button>
        <button class="action-btn complete-btn" onclick="markComplete('${shipDate}','${(customer||'').replace(/'/g,"\\'")}','${(manager||'').replace(/'/g,"\\'")}')">출하 완료</button>
      </div>`:''}
    </div>`;
  }

  function renderEmpty(msg) {
    return `<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">${msg}</div></div>`;
  }

  function selectWeekDate(dateStr, label) {
    selectedDate = dateStr;
    document.querySelectorAll('.week-day').forEach(el => el.classList.remove('active'));
    document.querySelectorAll(`.week-day[data-date="${dateStr}"]`).forEach(el => el.classList.add('active'));

    const rows = allData.filter(r => r[1] === dateStr);
    const todayStr = getLocalDate(0).str;
    const type = dateStr === todayStr ? 'today' : 'week';

    document.getElementById('selectedDateLabel').textContent = label;
    document.getElementById('weekCount').textContent = rows.length + '건';
    document.getElementById('weekList').innerHTML = rows.length > 0
      ? rows.map(r => renderCard(r, type)).join('') : renderEmpty('출하 일정 없음');
  }

  function buildWeekGrid() {
    const todayStr = getLocalDate(0).str;
    const tomorrowStr = getLocalDate(1).str;
    const grid = document.getElementById('weekGrid');
    const days = Array.from({length:7}, (_, i) => getLocalDate(i));

    grid.innerHTML = days.map(w => {
      const items = allData.filter(r => r[1] === w.str);
      const isToday = w.str === todayStr;
      const isTomorrow = w.str === tomorrowStr;
      const cls = isToday ? 'week-day is-today' : isTomorrow ? 'week-day is-tomorrow' : 'week-day';
      const nameCls = isToday ? 'week-day-name today-name' : isTomorrow ? 'week-day-name tomorrow-name' : 'week-day-name';
      const nameLabel = isToday ? `${w.dayName}(오늘)` : isTomorrow ? `${w.dayName}(내일)` : w.dayName;
      const itemsHtml = items.length > 0
        ? items.map(r => `<div class="week-item">▪ ${r[2]||'-'}</div>`).join('')
        : `<div class="week-empty">-</div>`;
      const isActive = w.str === selectedDate;

      return `<div class="${cls}${isActive?' active':''}" data-date="${w.str}" data-label="${w.label}" onclick="selectWeekDate('${w.str}','${w.label}')">
        <div class="week-day-hd">
          <span class="${nameCls}">${nameLabel}</span>
          <span class="week-day-date">${w.display}</span>
        </div>
        ${itemsHtml}
      </div>`;
    }).join('');
  }

  function buildDaySummary() {
    const today = new Date(); today.setHours(0,0,0,0);
    const todayStr = getLocalDate(0).str;
    const startStr = String(today.getMonth()+1) + '/' + String(today.getDate()).padStart(2,'0');
    const endDate = new Date(today); endDate.setDate(today.getDate() + 29);
    const endStr = String(endDate.getMonth()+1) + '/' + String(endDate.getDate()).padStart(2,'0');
    document.getElementById('summaryRange').textContent = `(${startStr} ~ ${endStr})`;

    const days = Array.from({length:30}, (_, i) => {
      const d = new Date(today); d.setDate(today.getDate() + i);
      return {
        str: d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0'),
        label: String(d.getMonth()+1) + '/' + String(d.getDate()).padStart(2,'0'),
        isToday: i === 0
      };
    });

    document.getElementById('daySummaryGrid').innerHTML = days.map(day => {
      const rows = allData.filter(r => r[1] === day.str);
      const done = rows.filter(r => r[8] === '완료').length;
      const hasData = rows.length > 0;
      const cls = day.isToday ? 'day-sum-card is-today' : hasData ? 'day-sum-card has-data' : 'day-sum-card';
      const dateCls = day.isToday ? 'day-sum-date today-date' : 'day-sum-date';
      return `<div class="${cls}">
        <div class="${dateCls}">${day.label}</div>
        <div class="day-sum-count">${rows.length > 0 ? rows.length : '-'}</div>
        ${done > 0 ? `<div class="day-sum-done">✓${done}</div>` : ''}
      </div>`;
    }).join('');
  }

  async function loadData() {
    try {
      const res = await fetch(SCRIPT_URL + '?t=' + Date.now());
      const rows = await res.json();
      allData = rows.slice(1).map(r => { r[1] = normalizeDate(r[1]); return r; });

      const todayStr = getLocalDate(0).str;
      const now = new Date(), currentYear = now.getFullYear(), currentMonth = now.getMonth();

      const todayRows = allData.filter(r => r[1] === todayStr);
      document.getElementById('todayCount').textContent = todayRows.length + '건';
      document.getElementById('todayList').innerHTML = todayRows.length > 0
        ? todayRows.map(r => renderCard(r, 'today')).join('') : renderEmpty('오늘 출하 일정 없음');

      buildWeekGrid();

      if (!selectedDate) {
        selectedDate = todayStr;
        document.getElementById('selectedDateLabel').textContent = getLocalDate(0).label;
        document.getElementById('weekCount').textContent = todayRows.length + '건';
        document.getElementById('weekList').innerHTML = todayRows.length > 0
          ? todayRows.map(r => renderCard(r, 'today')).join('') : renderEmpty('출하 일정 없음');
      } else {
        selectWeekDate(selectedDate, document.getElementById('selectedDateLabel').textContent);
      }

      buildDaySummary();

      document.getElementById('monthGrid').innerHTML = MONTHS.map((mName, mi) => {
        const count = allData.filter(r => {
          if (!r[1]) return false;
          const d = new Date(r[1]);
          return d.getFullYear() === currentYear && d.getMonth() === mi;
        }).length;
        const isCurrent = mi === currentMonth;
        return `<div class="month-card ${isCurrent?'current-month':''}">
          <div class="month-name ${isCurrent?'current':''}">${mName}</div>
          <div class="month-count ${isCurrent?'current':''}">${count}</div>
          <div class="month-unit">건</div></div>`;
      }).join('');

      const t = new Date();
      document.getElementById('lastUpdate').textContent =
        `마지막 갱신: ${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}`;

    } catch(err) {
      document.getElementById('todayList').innerHTML = renderEmpty('데이터 로딩 실패');
    }
  }

  // ESC 키로 모달 닫기
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeEditModal();
  });

  // 모달 외부 클릭 시 닫기
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeEditModal();
  });

  let countdown = 30;
  loadData();
  setInterval(() => {
    countdown--;
    document.getElementById('refreshCountdown').textContent = `다음 갱신: ${countdown}초`;
    if (countdown <= 0) { countdown = 30; loadData(); }
  }, 1000);
</script>
</body>
</html>
