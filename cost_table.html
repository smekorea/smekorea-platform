<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMERP — Cost Table</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f9;--surface:#fff;--border:#d0daea;
  --accent:#c8001e;--accent2:#1a56db;--accent3:#0e9f6e;--amber:#d97706;
  --text:#1a2233;--muted:#7a8baa;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

/* ── 상단바 ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:11px 28px;background:var(--surface);border-bottom:2px solid var(--border);box-shadow:0 2px 8px rgba(0,0,0,.06);position:sticky;top:0;z-index:50;}
.logo-box{width:38px;height:38px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace;font-size:13px;font-weight:900;color:#fff;}
.co-name{font-size:14px;font-weight:700;}.co-sub{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:2px;}
.back-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;background:var(--surface);border:1px solid var(--border);text-decoration:none;color:var(--muted);font-size:11px;font-family:'Share Tech Mono',monospace;transition:all .18s;}
.back-btn:hover{border-color:var(--accent2);color:var(--accent2);}

/* ── 탭 ── */
.tab-bar{display:flex;gap:6px;padding:12px 28px;background:var(--surface);border-bottom:1px solid var(--border);}
.tab-btn{padding:8px 20px;border:none;border-radius:8px;background:none;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-size:13px;font-weight:500;color:var(--muted);transition:all .18s;}
.tab-btn.active{background:var(--accent);color:#fff;font-weight:700;}

/* ── 검색 영역 ── */
.search-section{padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);}
.search-row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;}
.s-group{display:flex;flex-direction:column;gap:4px;}
.s-label{font-size:9px;font-family:'Share Tech Mono',monospace;color:var(--muted);letter-spacing:1px;}
.s-group input,.s-group select{height:36px;background:#f8fafc;border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:13px;padding:0 10px;outline:none;transition:border-color .18s;}
.s-group input:focus,.s-group select:focus{border-color:var(--accent2);background:#fff;}
.btn-search{height:36px;padding:0 18px;border-radius:8px;border:none;background:var(--accent2);color:#fff;font-size:13px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-search:hover{background:#1344b0;}
.btn-reset{height:36px;padding:0 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);font-size:13px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}

/* ── 콘텐츠 ── */
.content{padding:20px 28px;}

/* ── 업로드 탭 ── */
.upload-zone{border:2px dashed var(--border);border-radius:12px;padding:40px;text-align:center;cursor:pointer;background:#f8fafc;transition:all .2s;position:relative;}
.upload-zone:hover{border-color:var(--accent2);background:rgba(26,86,219,.04);}
.upload-zone input[type="file"]{position:absolute;inset:0;opacity:0;cursor:pointer;}
.file-sel{display:none;align-items:center;gap:12px;background:rgba(26,86,219,.06);border:1.5px solid rgba(26,86,219,.2);border-radius:10px;padding:12px 16px;margin-top:14px;}
.file-sel.show{display:flex;}

/* ── 테이블 ── */
.table-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.table-wrap{border:1px solid var(--border);border-radius:12px;overflow:hidden;overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;white-space:nowrap;}
thead th{background:#1a2233;padding:10px 12px;text-align:left;font-weight:700;color:#fff;font-size:11px;border-bottom:2px solid #0d1520;position:sticky;top:0;}
thead th.pivot-header{background:#1a3a5a;text-align:center;}
tbody tr{border-bottom:1px solid #e8edf5;transition:background .1s;cursor:pointer;}
tbody tr:hover{background:rgba(26,86,219,.04);}
tbody td{padding:9px 12px;font-size:12px;}
tbody td.num{text-align:right;font-family:'Share Tech Mono',monospace;}
tbody td.center{text-align:center;}

/* ── 배지 ── */
.badge{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;font-family:'Share Tech Mono',monospace;}
.b-lg{background:rgba(200,0,30,.08);color:var(--accent);}
.b-direct{background:rgba(26,86,219,.08);color:var(--accent2);}
.b-warn{background:rgba(217,119,6,.12);color:var(--amber);}
.b-ok{background:rgba(14,159,110,.1);color:var(--accent3);}
.b-danger{background:rgba(200,0,30,.1);color:var(--accent);}

/* ── 마진 바 ── */
.margin-bar{display:flex;align-items:center;gap:6px;}
.margin-bg{width:60px;height:6px;background:#e8edf5;border-radius:3px;overflow:hidden;}
.margin-fill{height:100%;border-radius:3px;transition:width .3s;}

/* ── 상세 모달 ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:14px;width:860px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:2px solid var(--border);position:sticky;top:0;background:#fff;z-index:10;}
.modal-title{font-size:15px;font-weight:700;color:var(--accent);}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);}
.modal-body{padding:16px 20px;}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.info-card{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.info-label{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;margin-bottom:3px;}
.info-val{font-size:13px;font-weight:700;color:var(--text);}

/* ── 분석 카드 ── */
.analysis-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:20px;}
.a-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.a-card-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:12px;display:flex;align-items:center;gap:6px;}

/* ── 기타 ── */
.btn-excel{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);color:var(--accent3);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn-template{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface);color:var(--accent2);font-size:12px;font-weight:700;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--accent3);color:#fff;font-weight:700;font-size:13px;padding:12px 26px;border-radius:50px;transition:transform .4s cubic-bezier(.34,1.56,.64,1);z-index:300;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.error{background:var(--accent);}
.toast.warn{background:var(--amber);}
.empty-state{text-align:center;padding:48px;color:var(--muted);}
.loading{display:flex;align-items:center;justify-content:center;gap:8px;padding:18px;color:var(--muted);font-size:11px;}
.spinner{width:12px;height:12px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
.sec-title{font-size:12px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.form-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;}
hr{border:none;border-top:1px solid var(--border);margin:14px 0;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 미리보기 테이블 ── */
.preview-wrap{margin-top:16px;display:none;}
.preview-table-wrap{border:1px solid var(--border);border-radius:8px;overflow:hidden;overflow-x:auto;max-height:320px;overflow-y:auto;}
.preview-table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
.preview-table thead th{background:#1a2233;color:#fff;padding:8px 10px;font-size:10px;}
.preview-table tbody td{padding:7px 10px;border-bottom:1px solid #e8edf5;}
.preview-table tbody tr.err-row{background:rgba(200,0,30,.04);}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <div class="logo-box">SME</div>

  </div>

    <div style="display:flex;align-items:center;gap:5px;background:rgba(200,0,30,.07);border:1px solid rgba(200,0,30,.2);border-radius:20px;padding:5px 12px;font-size:10px;font-family:'Share Tech Mono',monospace;color:var(--accent);font-weight:700;">● COST TABLE</div>

<div class="tab-bar">

<!-- ══ 조회 탭 ══ -->
<div id="tab-list">
  <div class="search-section">
    <div class="search-row">
      <div class="s-group">

      </div>

    <div class="loading"><div class="spinner"></div> 분석 데이터 로딩 중...</div>

      <div class="modal-title" id="modalTitle">단가 상세</div>

<script>
const SUPABASE_URL = 'https://muxuhrbsbrstmrrvlupw.supabase.co';
const SUPABASE_KEY = 'sb_publishable_RYvQTDoDvwTuVPezpIeotg_EDSd9Wbb';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 인증 확인
if(sessionStorage.getItem('hq_auth') !== '1') window.location.href = 'index.html';

let allData = [], listData = [], curFile = null, curRows = [];

// ── 탭 전환 ──
function switchTab(t) {
  ['list','upload','analysis'].forEach(x => {
    document.getElementById('tab-'+x).style.display = x===t ? 'block' : 'none';
    document.getElementById('tab-'+x+'-btn').classList.toggle('active', x===t);
  });
  if(t === 'analysis') loadAnalysis();
}

function showToast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'toast'+(type?' '+type:'')+' show';
  setTimeout(() => el.className = 'toast', 3500);
}

// ── 드롭다운 초기화 ──
async function initDropdowns() {
  try {
    const {data} = await sb.from('price_master').select('maker,supplier,customer').order('maker');
    if(!data) return;
    const makers    = [...new Set(data.map(r=>r.maker).filter(Boolean))].sort();
    const suppliers = [...new Set(data.map(r=>r.supplier).filter(Boolean))].sort();
    const customers = [...new Set(data.map(r=>r.customer).filter(Boolean))].sort();
    const makerSel = document.getElementById('s-maker');
    makers.forEach(m => { const o=document.createElement('option'); o.value=m; o.textContent=m; makerSel.appendChild(o); });
    const supSel = document.getElementById('s-supplier');
    suppliers.forEach(s => { const o=document.createElement('option'); o.value=s; o.textContent=s; supSel.appendChild(o); });
    const custSel = document.getElementById('s-customer');
    customers.forEach(c => { const o=document.createElement('option'); o.value=c; o.textContent=c; custSel.appendChild(o); });
  } catch(e) { console.warn('드롭다운 로드 실패', e); }
}

// ── 조회 ──
async function searchCost() {
  const maker    = document.getElementById('s-maker').value;
  const erp      = document.getElementById('s-erp').value.trim();
  const mkpn     = document.getElementById('s-mkpn').value.trim();
  const trade    = document.getElementById('s-trade').value;
  const supplier = document.getElementById('s-supplier').value;
  const customer = document.getElementById('s-customer').value;
  const margin   = document.getElementById('s-margin').value;

  document.getElementById('listBody').innerHTML = '<tr><td colspan="20"><div class="loading"><div class="spinner"></div> 조회 중...</div></td></tr>';
  document.getElementById('excelBtn').style.display = 'none';

  try {
    let q = sb.from('price_master').select('*').order('maker').order('erp_code').order('valid_from', {ascending:false});
    if(maker)    q = q.eq('maker', maker);
    if(erp)      q = q.ilike('erp_code', '%'+erp+'%');
    if(mkpn)     q = q.ilike('maker_pn', '%'+mkpn+'%');
    if(trade)    q = q.eq('trade_type', trade);
    if(supplier) q = q.eq('supplier', supplier);
    if(customer) q = q.eq('customer', customer);

    const {data, error} = await q;
    if(error) throw error;

    allData = data || [];

    // 마진 필터
    let filtered = allData.filter(r => {
      if(!margin) return true;
      const mp = calcMargin(r);
      if(margin === 'danger') return mp !== null && mp < 5;
      if(margin === 'warn')   return mp !== null && mp < 10;
      return true;
    });

    // 품목별 피벗 (ERP코드 + 구매처 기준으로 그룹)
    renderPivotTable(filtered);
    listData = filtered;
    document.getElementById('listCount').textContent = `— ${filtered.length.toLocaleString()}건`;
    if(filtered.length) document.getElementById('excelBtn').style.display = 'flex';
  } catch(e) {
    showToast('⚠ 조회 실패: '+e.message, 'error');
    document.getElementById('listBody').innerHTML = '<tr><td colspan="20"><div class="empty-state"><p>조회 실패</p></div></td></tr>';
  }
}

function calcMargin(r) {
  if(!r.buy_price || !r.sell_price) return null;
  const buy  = r.buy_currency === 'USD' ? r.buy_price * (r.exchange_rate||1) : r.buy_price;
  const sell = r.sell_currency === 'USD' ? r.sell_price * (r.exchange_rate||1) : r.sell_price;
  if(!buy) return null;
  return Math.round(((sell - buy) / sell) * 1000) / 10;
}

function renderPivotTable(data) {
  // 품목 × 구매처 그룹
  const groups = {};
  data.forEach(r => {
    const key = `${r.erp_code}||${r.supplier||''}`;
    if(!groups[key]) groups[key] = { ...r, customers: {} };
    if(r.customer) groups[key].customers[r.customer] = r;
  });

  // 전체 판매처 목록
  const allCustomers = [...new Set(data.map(r=>r.customer).filter(Boolean))].sort();

  // 헤더
  const head = document.getElementById('listHead');
  head.innerHTML = `<tr>
    <th>공급구분</th><th>Maker</th><th>ERP코드</th><th>Maker P/N</th>
    <th>구매처</th><th>매입통화</th><th style="text-align:right">매입단가</th>
    <th style="text-align:right">LG인증가</th>
    ${allCustomers.map(c=>`<th class="pivot-header" colspan="2" title="${c}">${c.length>10?c.slice(0,10)+'…':c}</th>`).join('')}
    <th>변동일자</th><th>등록자</th>
  </tr>
  <tr style="background:#253347;">
    <th colspan="8" style="color:#aaa;font-size:9px;"></th>
    ${allCustomers.map(()=>`<th style="background:#1a3a5a;color:#aaa;font-size:9px;text-align:right;">단가</th><th style="background:#1a3a5a;color:#aaa;font-size:9px;text-align:center;">마진율</th>`).join('')}
    <th colspan="2" style="color:#aaa;font-size:9px;"></th>
  </tr>`;

  // 바디
  const rows = Object.values(groups);
  if(!rows.length) {
    document.getElementById('listBody').innerHTML = '<tr><td colspan="20"><div class="empty-state"><div style="font-size:28px;margin-bottom:8px;">📭</div><p>조회 결과가 없습니다</p></div></td></tr>';
    return;
  }

  document.getElementById('listBody').innerHTML = rows.map(r => {
    const buyKRW = r.buy_currency==='USD' ? (r.buy_price*(r.exchange_rate||1)) : r.buy_price;
    const buyDisp = r.buy_currency==='USD'
      ? `$${r.buy_price?.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:4})}`
      : (r.buy_price?.toLocaleString()+'원');

    const custCols = allCustomers.map(c => {
      const cr = r.customers[c];
      if(!cr) return '<td>—</td><td>—</td>';
      const sellDisp = cr.sell_currency==='USD'
        ? `$${cr.sell_price?.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:4})}`
        : (cr.sell_price?.toLocaleString()+'원');
      const mp = calcMarginFromValues(buyKRW, cr.sell_price, cr.sell_currency, cr.exchange_rate);
      const mpColor = mp===null?'var(--muted)':mp<5?'var(--accent)':mp<10?'var(--amber)':'var(--accent3)';
      const mpBadge = mp===null?'—':`<span style="color:${mpColor};font-weight:700;">${mp}%</span>${mp<5?' ⚠':''}`;
      return `<td class="num">${sellDisp}</td><td class="center">${mpBadge}</td>`;
    }).join('');

    const tradeTag = r.trade_type==='LG사급'?'<span class="badge b-lg">LG사급</span>':r.trade_type==='직거래'?'<span class="badge b-direct">직거래</span>':'—';
    const lgCert = r.lg_cert_price ? r.lg_cert_price.toLocaleString()+'원' : '—';

    return `<tr onclick="openDetail('${r.erp_code}','${(r.supplier||'').replace(/'/g,"\\'")}')">
      <td>${tradeTag}</td>
      <td style="font-weight:600;">${r.maker||'—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:11px;">${r.erp_code||'—'}</td>
      <td style="font-family:'Share Tech Mono',monospace;font-size:11px;">${r.maker_pn||'—'}</td>
      <td>${r.supplier||'—'}</td>
      <td class="center"><span class="badge" style="background:rgba(26,86,219,.08);color:var(--accent2);">${r.buy_currency||'KRW'}</span></td>
      <td class="num">${buyDisp}</td>
      <td class="num" style="color:var(--accent3);">${lgCert}</td>
      ${custCols}
      <td style="font-size:11px;color:var(--muted);">${r.valid_from||'—'}</td>
      <td style="font-size:11px;">${r.registered_by||'—'}</td>
    </tr>`;
  }).join('');
}

function calcMarginFromValues(buyKRW, sellPrice, sellCurrency, exRate) {
  if(!buyKRW || !sellPrice) return null;
  const sellKRW = sellCurrency==='USD' ? sellPrice*(exRate||1) : sellPrice;
  if(!sellKRW) return null;
  return Math.round(((sellKRW - buyKRW) / sellKRW) * 1000) / 10;
}

}

// ── 파일 업로드 ──
function onDragOver(e){e.preventDefault();document.getElementById('uploadZone').style.borderColor='var(--accent2)';}
function onDragLeave(){document.getElementById('uploadZone').style.borderColor='';}
function onDrop(e){e.preventDefault();onDragLeave();const f=e.dataTransfer.files[0];if(f)processFile(f);}
function onFileSelect(e){const f=e.target.files[0];if(f)processFile(f);}
function processFile(f){
  if(!f.name.match(/\.(xlsx|xls)$/i)){showToast('⚠ Excel 파일만 지원됩니다','error');return;}
  curFile=f;
  document.getElementById('fileName').textContent=f.name;
  document.getElementById('fileSize').textContent=(f.size/1024).toFixed(1)+' KB';
  document.getElementById('fileSel').classList.add('show');
  parseFile();
}
function clearFile(){
  curFile=null; curRows=[];
  document.getElementById('fileInput').value='';
  document.getElementById('fileSel').classList.remove('show');
  document.getElementById('previewWrap').style.display='none';
}
function fmtD(v){
  if(!v) return '';
  if(v instanceof Date) return v.getFullYear()+'-'+String(v.getMonth()+1).padStart(2,'0')+'-'+String(v.getDate()).padStart(2,'0');
  return String(v).trim();
}
function parseFile(){
  if(!curFile) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array',cellDates:true});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const raw=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      // 헤더 찾기 (★ Maker 행)
      let hdr=-1;
      for(let i=0;i<10;i++){if(raw[i]?.some(c=>String(c).includes('Maker')&&String(c).includes('★'))){hdr=i;break;}}
      if(hdr<0){showToast('⚠ 등록양식이 아닙니다','error');return;}
      // 컬럼 인덱스 매핑
      const h=raw[hdr].map(c=>String(c).replace('★','').trim());
      const ci=name=>h.indexOf(name);
      // 데이터 파싱 (6행부터)
      curRows=raw.slice(hdr+3).filter(r=>r.some(c=>c!=='')).map((r,i)=>({
        row:i+1,
        maker:        String(r[ci('Maker')]||'').trim(),
        maker_pn:     String(r[ci('Maker P/N')]||'').trim(),
        lg_pn:        String(r[ci('LG P/N')]||'').trim(),
        erp_code:     String(r[ci('ERP코드')]||'').trim(),
        description:  String(r[ci('Description')]||'').trim(),
        trade_type:   String(r[ci('공급구분')]||'').trim(),
        supplier:     String(r[ci('구매처명')]||'').trim(),
        buy_currency: String(r[ci('매입통화')]||'KRW').trim().toUpperCase(),
        buy_price:    Number(r[ci('매입단가')])||null,
        exchange_rate:Number(r[ci('적용환율')])||null,
        lg_cert_price:Number(r[ci('LG인증가(KRW)')])||null,
        customer:     String(r[ci('판매처명')]||'').trim(),
        sell_currency:String(r[ci('판매통화')]||'KRW').trim().toUpperCase(),
        sell_price:   Number(r[ci('판매단가')])||null,
        valid_from:   fmtD(r[ci('적용일자')]),
        change_type:  String(r[ci('변동구분')]||'신규').trim(),
        change_reason:String(r[ci('변동사유')]||'').trim(),
        registered_by:String(r[ci('등록자')]||'').trim(),
      }));
      renderPreview();
    }catch(err){showToast('⚠ 파일 읽기 실패: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(curFile);
}
function validate(r){
  const e=[];
  if(!r.maker) e.push('Maker');
  if(!r.erp_code) e.push('ERP코드');
  if(!r.buy_price) e.push('매입단가');
  if(!r.valid_from) e.push('적용일자');
  if(!r.registered_by) e.push('등록자');
  return e;
}
function renderPreview(){
  let errTotal=0;
  document.getElementById('previewBody').innerHTML=curRows.map(r=>{
    const errs=validate(r); if(errs.length) errTotal++;
    const st=errs.length?`<span style="color:var(--accent);font-size:10px;">⚠${errs.join(',')}</span>`:'<span style="color:var(--accent3);font-size:10px;">✓OK</span>';
    const buyDisp=r.buy_currency==='USD'?`$${r.buy_price}`:`${r.buy_price?.toLocaleString()}원`;
    const sellDisp=r.sell_currency==='USD'?`$${r.sell_price}`:`${r.sell_price?.toLocaleString()}원`;
    return`<tr class="${errs.length?'err-row':''}">
      <td>${r.row}</td><td>${r.maker}</td><td style="font-size:10px;">${r.maker_pn}</td>
      <td style="font-family:'Share Tech Mono',monospace;">${r.erp_code}</td>
      <td>${r.trade_type}</td><td>${r.supplier}</td><td>${r.buy_currency}</td>
      <td style="text-align:right;">${buyDisp}</td><td>${r.customer}</td>
      <td style="text-align:right;">${sellDisp}</td>
      <td>${r.valid_from}</td><td>${r.change_type}</td><td>${r.registered_by}</td>
      <td>${st}</td>
    </tr>`;
  }).join('');
  document.getElementById('rowCount').textContent=curRows.length;
  document.getElementById('errCount').textContent=errTotal;
  document.getElementById('submitBtn').disabled=errTotal>0;
  document.getElementById('previewWrap').style.display='block';
  if(errTotal) showToast(`⚠ ${errTotal}건 오류 확인 필요`,'warn');
  else showToast(`✓ ${curRows.length}건 확인완료. 등록 버튼을 눌러주세요`);
}
async function submitData(){
  const btn=document.getElementById('submitBtn');
  btn.disabled=true; btn.textContent='등록 중...';
  try{
    const rows=curRows.map(r=>({
      maker:r.maker, maker_pn:r.maker_pn||null, lg_pn:r.lg_pn||null,
      erp_code:r.erp_code, description:r.description||null,
      trade_type:r.trade_type||null, supplier:r.supplier||null,
      buy_currency:r.buy_currency, buy_price:r.buy_price,
      exchange_rate:r.exchange_rate||null, lg_cert_price:r.lg_cert_price||null,
      customer:r.customer||null, sell_currency:r.sell_currency,
      sell_price:r.sell_price||null, valid_from:r.valid_from||null,
      change_type:r.change_type, change_reason:r.change_reason||null,
      registered_by:r.registered_by
    }));
    // 500건씩 청크 업로드
    const CHUNK=500;
    for(let i=0;i<rows.length;i+=CHUNK){
      const {error}=await sb.from('price_master').insert(rows.slice(i,i+CHUNK));
      if(error) throw error;
    }
    showToast(`✓ ${curRows.length}건 등록 완료`);
    clearFile();
    initDropdowns();
  }catch(e){showToast('⚠ 등록 실패: '+e.message,'error');}
  btn.disabled=false; btn.textContent='✓ 등록';
}

    {h:'★ Maker',w:16},{h:'★ Maker P/N',w:22},{h:'LG P/N',w:18},

    {h:'★ 구매처명',w:20},{h:'★ 매입통화',w:10},{h:'★ 매입단가',w:12},
    {h:'적용환율',w:12},{h:'LG인증가(KRW)',w:14},{h:'★ 판매처명',w:24},
    {h:'★ 판매통화',w:10},{h:'★ 판매단가',w:12},{h:'★ 적용일자',w:14},
    {h:'★ 변동구분',w:16},{h:'★ 변동사유',w:30},{h:'★ 등록자',w:12},
  ];
  cols.forEach((c,i)=>{ws2.getColumn(i+1).width=c.w;});
  // 타이틀
  ws2.mergeCells('A1:R1');
  const t=ws2.getCell('A1');
  t.value='SMERP — Cost Table 단가 등록 양식';
  t.font={bold:true,size:13,color:{argb:'FFC8501A'}};
  t.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFEF0E7'}};
  t.alignment={horizontal:'center',vertical:'middle'};
  ws2.getRow(1).height=24;
  // 안내
  ws2.mergeCells('A2:R2');
  const a=ws2.getCell('A2');
  a.value='※ ★ 표시 컬럼은 필수 | 매입/판매단가는 통화 그대로 입력 | 적용환율: USD 거래 시 필수 | LG인증가: LG관련 거래 시 입력 | 구매처: Maker 직거래 시 Maker명';
  a.font={size:9,color:{argb:'FF888888'}};
  a.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF9F9F9'}};
  ws2.getRow(2).height=15;
  // 헤더
  const hRow=ws2.getRow(3); hRow.height=30;
  cols.forEach((c,i)=>{
    const cell=hRow.getCell(i+1);
    cell.value=c.h;
    const req=c.h.startsWith('★');
    cell.font={bold:true,size:10,color:{argb:'FFFFFFFF'}};
    cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:req?'FFC8501A':'FFE07830'}};
    cell.alignment={horizontal:'center',vertical:'middle',wrapText:true};
    cell.border={top:{style:'medium'},bottom:{style:'medium'},left:{style:'thin'},right:{style:'thin'}};
  });
  // 가이드
  const guides=['제조사명','메이커 품번','LG품번(없으면공백)','이카운트품번','부품명(영문)','직거래/LG사급','KRW또는USD','통화그대로입력','USD만입력','LG관련거래시','매출처명칭','KRW또는USD','통화그대로입력','YYYY-MM-DD','신규/인상/인하/환율조정/수정','변동이유상세','담당자실명'];
  const gRow=ws2.getRow(4); gRow.height=18;
  guides.forEach((g,i)=>{
    const c=gRow.getCell(i+1);
    c.value=g; c.font={size:8,color:{argb:'FF888888'},italic:true};
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFF2F2F2'}};
    c.alignment={horizontal:'center',vertical:'middle'};
  });
  // 예시
  const exVals=['SMART','RC-98TRJ1K20','0RH1201L622','9001-001','RESISTOR CHIP','LG사급','SMART','USD','0.35','1380','600','LG전자 협력사A','KRW','550','2026-04-09','신규','최초 단가 등록','배병대'];
  const eRow=ws2.getRow(5); eRow.height=20;
  exVals.forEach((v,i)=>{
    const c=eRow.getCell(i+1);
    c.value=v; c.font={size:9,color:{argb:'FF7A3A10'},italic:true};
    c.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FFFEF0E7'}};
    c.alignment={horizontal:'center',vertical:'middle'};
  });
  // 입력영역
  for(let r=6;r<=105;r++){
    const row=ws2.getRow(r); row.height=18;
    for(let c=1;c<=18;c++){
      const cell=row.getCell(c);
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:r%2===0?'FFFFFFFF':'FFFFFAF7'}};
      cell.border={top:{style:'thin',color:{argb:'FFDDDDDD'}},bottom:{style:'thin',color:{argb:'FFDDDDDD'}},left:{style:'thin',color:{argb:'FFDDDDDD'}},right:{style:'thin',color:{argb:'FFDDDDDD'}}};
    }
  }
  ws2.views=[{state:'frozen',ySplit:5}];
  const buf=await wb2.xlsx.writeBuffer();
  const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
  const a2=document.createElement('a'); a2.href=URL.createObjectURL(blob);
  a2.download=`SME_CostTable_단가등록양식_${new Date().toISOString().slice(0,10).replace(/-/g,'')}.xlsx`;
  a2.click();
  showToast('✓ 양식 다운로드 완료');
}

// ── 엑셀 다운로드 ──
function exportExcel(){
  if(!listData.length){showToast('⚠ 먼저 조회해주세요','warn');return;}
  const h=['공급구분','Maker','ERP코드','Maker P/N','LG P/N','Description','구매처','매입통화','매입단가','적용환율','LG인증가','판매처','판매통화','판매단가','마진율','적용일자','변동구분','변동사유','등록자'];
  const rows=listData.map(r=>{
    const m=calcMargin(r);
    return[r.trade_type,r.maker,r.erp_code,r.maker_pn,r.lg_pn,r.description,r.supplier,r.buy_currency,r.buy_price,r.exchange_rate,r.lg_cert_price,r.customer,r.sell_currency,r.sell_price,m!==null?m+'%':'',r.valid_from,r.change_type,r.change_reason,r.registered_by];
  });
  const ws3=XLSX.utils.aoa_to_sheet([h,...rows]);
  const wb3=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb3,ws3,'단가조회');
  XLSX.writeFile(wb3,`SME_CostTable_조회_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('✓ 엑셀 다운로드 완료');
}
