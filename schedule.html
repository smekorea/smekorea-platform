<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SME CALENDAR</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Share+Tech+Mono&family=Barlow+Condensed:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f0ece4; --surface:#fff; --border:#ddd5c8; --border2:#b8a898;
    --accent:#c8001e; --accent2:#1a56db; --text:#1a1612; --muted:#8a7a6a; --locked:#b8aaa0;
    --c-hq:#c8001e; --c-india:#ea6a0a; --c-thai:#1d4ed8; --c-china:#15803d;
    --c-duty:#6d28d9; --c-event:#b45309; --c-deadline:#1a56db;
    --shadow:0 2px 12px rgba(80,55,30,0.1); --shadow-lg:0 8px 32px rgba(80,55,30,0.15);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;}

  /* ── TOPBAR ── */
  .topbar{position:sticky;top:0;z-index:200;background:#1a1612;
    padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:16px;}
  .topbar-left{display:flex;align-items:center;gap:16px;flex-shrink:0;}
  .home-btn{display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.5);font-family:'Share Tech Mono',monospace;
    font-size:11px;letter-spacing:1px;text-decoration:none;transition:color .15s;padding:6px 10px;
    border:1px solid rgba(255,255,255,0.12);border-radius:20px;}
  .home-btn:hover{color:#fff;border-color:rgba(255,255,255,0.3);}
  .topbar-divider{width:1px;height:24px;background:rgba(255,255,255,0.12);}
  .topbar-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;font-size:24px;letter-spacing:-.5px;line-height:1;color:#fff;}
  .topbar-logo .red{color:var(--accent);}
  .topbar-logo .sub{font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:4px;color:rgba(255,255,255,0.4);font-style:normal;font-weight:400;display:block;margin-top:2px;}

  .tz-pills{display:flex;gap:6px;align-items:center;}
  .tz-pill{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);border-radius:20px;padding:5px 12px;
    font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(255,255,255,0.85);font-weight:700;letter-spacing:1px;}

  .topbar-right{display:flex;align-items:center;gap:12px;flex-shrink:0;}
  .hq-clock{font-family:'Share Tech Mono',monospace;font-size:24px;font-weight:900;color:var(--accent);letter-spacing:2px;}
  .hq-date{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);letter-spacing:1px;}
  .add-btn{display:flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:none;
    border-radius:20px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;
    font-family:'Noto Sans KR',sans-serif;text-decoration:none;transition:background .15s;white-space:nowrap;}
  .add-btn:hover{background:#a8001a;}
  .refresh-tag{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,255,255,0.3);letter-spacing:1px;white-space:nowrap;}

  /* ── BADGE BAR ── */
  .badge-bar{background:var(--surface);border-bottom:2px solid var(--border);
    padding:9px 24px;display:flex;align-items:center;gap:8px;overflow-x:auto;scrollbar-width:none;
    position:relative;z-index:1;}
  .badge-bar::-webkit-scrollbar{display:none;}
  .badge-bar-label{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;
    color:var(--locked);white-space:nowrap;flex-shrink:0;padding-right:4px;
    border-right:1px solid var(--border);}
  .ev-badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:20px;
    font-size:11px;font-weight:700;white-space:nowrap;font-family:'Share Tech Mono',monospace;flex-shrink:0;}
  .b-hq      {background:rgba(200,0,30,0.12); color:#9a0016; border:1.5px solid rgba(200,0,30,0.3);}
  .b-india   {background:rgba(234,106,10,0.12);color:#b84d00; border:1.5px solid rgba(234,106,10,0.3);}
  .b-thai    {background:rgba(29,78,216,0.1);  color:#1239a0; border:1.5px solid rgba(29,78,216,0.25);}
  .b-china   {background:rgba(21,128,61,0.1);  color:#0d6630; border:1.5px solid rgba(21,128,61,0.25);}
  .b-duty    {background:rgba(109,40,217,0.1); color:#5219a8; border:1.5px solid rgba(109,40,217,0.25);}
  .b-event   {background:rgba(180,83,9,0.1);   color:#92420a; border:1.5px solid rgba(180,83,9,0.2);}
  .b-deadline{background:rgba(26,86,219,0.1);  color:#1239a0; border:1.5px solid rgba(26,86,219,0.2);}
  .b-today{outline:2px solid var(--accent);outline-offset:1px;}

  /* ── MAIN LAYOUT ── */
  .main-wrap{position:relative;z-index:1;display:grid;grid-template-columns:1fr 310px;
    max-width:100%;padding:20px 24px 0;gap:20px;align-items:start;}

  /* ── CALENDAR ── */
  .calendar-wrap{background:var(--surface);border-radius:16px;padding:20px;border:1.5px solid var(--border);box-shadow:var(--shadow);}
  .cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .cal-nav-btn{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--border);
    background:var(--bg);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;
    transition:all .15s;color:var(--text);}
  .cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);background:rgba(200,0,30,0.04);}
  .cal-month{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;
    font-size:32px;letter-spacing:-1px;color:var(--text);}
  .cal-month span{color:var(--accent);}

  .cal-filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
  .cal-filter{padding:5px 13px;border-radius:20px;border:1.5px solid var(--border);
    font-size:10px;font-weight:700;cursor:pointer;font-family:'Share Tech Mono',monospace;
    background:var(--bg);color:var(--muted);transition:all .15s;letter-spacing:.5px;}
  .cal-filter:hover{border-color:var(--border2);color:var(--text);}
  .cal-filter.on{background:var(--text);color:#fff;border-color:var(--text);}

  .cal-head{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:5px;background:var(--bg);border-radius:8px;}
  .cal-head-cell{text-align:center;font-size:10px;font-weight:700;color:var(--muted);
    padding:7px 0;font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
  .cal-head-cell:first-child{color:#c8001e;}
  .cal-head-cell:last-child{color:#1a56db;}

  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .cal-cell{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;
    padding:7px 6px 5px;min-height:92px;cursor:pointer;
    transition:all .15s;position:relative;display:flex;flex-direction:column;gap:2px;}
  .cal-cell:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(200,0,30,0.15);z-index:2;background:var(--surface);}
  .cal-cell.other-month{opacity:.28;cursor:default;}
  .cal-cell.other-month:hover{border-color:var(--border);box-shadow:none;background:var(--bg);}
  .cal-cell.today{border-color:var(--accent);border-width:2px;background:rgba(200,0,30,0.03);}
  .cal-cell.selected{background:rgba(200,0,30,0.05);border-color:var(--accent);border-width:2px;}
  .cal-cell.sunday .cal-date{color:#c8001e;}
  .cal-cell.saturday .cal-date{color:#1a56db;}
  .cal-date{font-size:13px;font-weight:700;color:var(--text);font-family:'Share Tech Mono',monospace;line-height:1;}
  .cal-cell.today .cal-date{background:var(--accent);color:#fff;width:22px;height:22px;
    border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;}

  .cell-events{display:flex;flex-direction:column;gap:2px;margin-top:3px;}
  .cell-event{font-size:9px;font-weight:700;padding:2px 5px;border-radius:4px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.5;}
  .ev-hq      {background:rgba(200,0,30,0.15);  color:#9a0016;}
  .ev-india   {background:rgba(234,106,10,0.15); color:#b84d00;}
  .ev-thai    {background:rgba(29,78,216,0.13);  color:#1239a0;}
  .ev-china   {background:rgba(21,128,61,0.13);  color:#0d6630;}
  .ev-duty    {background:rgba(109,40,217,0.13); color:#5219a8;}
  .ev-event   {background:rgba(180,83,9,0.13);   color:#92420a;}
  .ev-deadline{background:rgba(26,86,219,0.13);  color:#1239a0;}
  .cell-more{font-size:9px;color:var(--locked);padding-left:3px;font-family:'Share Tech Mono',monospace;}

  /* ── RIGHT PANEL ── */
  .list-wrap{position:sticky;top:68px;}
  .list-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
    overflow:hidden;box-shadow:var(--shadow);}

  .week-tabs{display:flex;background:var(--bg);border-bottom:1.5px solid var(--border);}
  .week-tab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:700;cursor:pointer;
    font-family:'Share Tech Mono',monospace;color:var(--muted);transition:all .15s;
    letter-spacing:.5px;border-bottom:2px solid transparent;margin-bottom:-1px;}
  .week-tab:hover{color:var(--text);}
  .week-tab.on{color:var(--accent);border-bottom-color:var(--accent);background:var(--surface);}

  .list-header{padding:13px 18px 10px;border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;background:var(--surface);}
  .list-header-title{font-size:13px;font-weight:700;color:var(--text);}
  .list-header-count{font-size:11px;font-weight:700;color:#fff;background:var(--accent);
    padding:2px 10px;border-radius:10px;font-family:'Share Tech Mono',monospace;}

  .list-body{max-height:calc(100vh - 280px);overflow-y:auto;padding:6px 0;}
  .list-body::-webkit-scrollbar{width:3px;}
  .list-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .list-item{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;cursor:pointer;
    transition:background .12s;border-left:3px solid transparent;}
  .list-item:hover{background:var(--bg);}
  .list-item.is-active{background:rgba(200,0,30,0.05);border-left-color:var(--accent);}
  .list-item.past{opacity:.4;}
  .list-date-block{min-width:36px;text-align:center;flex-shrink:0;}
  .list-date-d{font-size:18px;font-weight:900;color:var(--text);line-height:1;font-family:'Share Tech Mono',monospace;}
  .list-date-m{font-size:9px;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
  .list-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
  .list-info{flex:1;min-width:0;}
  .list-meta{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
  .list-flag{font-size:12px;}
  .list-ename{font-size:9px;font-weight:700;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
  .list-type{font-size:9px;color:var(--locked);font-family:'Share Tech Mono',monospace;margin-left:2px;}
  .list-title{font-size:12px;font-weight:700;color:var(--text);margin-bottom:2px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .list-duty-tag{font-size:10px;color:#5219a8;font-weight:700;}
  .list-note{font-size:10px;color:var(--muted);}
  .list-empty{text-align:center;padding:32px;color:var(--locked);font-size:12px;}

  .legend{display:flex;flex-wrap:wrap;gap:6px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);}
  .legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);font-weight:600;}
  .legend-dot{width:8px;height:8px;border-radius:50%;}

  /* ── ANNUAL TIMELINE ── */
  .timeline-wrap{position:relative;z-index:1;padding:0 24px;margin-top:20px;}
  .timeline-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
    padding:18px 22px 16px;box-shadow:var(--shadow);}
  .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .section-title{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
    letter-spacing:3px;color:var(--muted);text-transform:uppercase;}
  .section-year{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;
    font-size:20px;color:var(--text);}
  .section-year span{color:var(--accent);}

  .months-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;}
  .month-col{cursor:pointer;border-radius:10px;padding:8px 6px;border:1.5px solid var(--border);
    background:var(--bg);transition:all .15s;}
  .month-col:hover{border-color:var(--border2);background:var(--surface);box-shadow:0 4px 12px rgba(80,55,30,0.12);}
  .month-col.current-month{border-color:var(--accent);border-width:2px;background:rgba(200,0,30,0.04);}
  .month-col.selected-month{background:rgba(200,0,30,0.06);border-color:var(--accent);}
  .month-label{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
    color:var(--muted);text-align:center;margin-bottom:8px;letter-spacing:1px;}
  .month-col.current-month .month-label{color:var(--accent);}
  .month-bar-wrap{height:44px;display:flex;flex-direction:column;justify-content:flex-end;margin-bottom:5px;}
  .month-bar-stack{display:flex;height:100%;flex-direction:column;justify-content:flex-end;gap:1px;}
  .bar-seg{border-radius:2px;min-height:3px;transition:height .3s;}
  .bar-hq{background:#c8001e;} .bar-india{background:#ea6a0a;} .bar-thai{background:#1d4ed8;}
  .bar-china{background:#15803d;} .bar-duty{background:#6d28d9;} .bar-event{background:#b45309;} .bar-deadline{background:#1a56db;}
  .month-count{text-align:center;font-family:'Share Tech Mono',monospace;font-size:11px;font-weight:700;color:var(--text);}
  .month-count.zero{color:var(--locked);}
  .month-weeks{display:flex;gap:2px;margin-top:5px;justify-content:center;}
  .week-dot{width:5px;height:5px;border-radius:50%;background:var(--border);}
  .week-dot.has-ev{background:var(--accent2);}
  .timeline-legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);}
  .tl-legend-item{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--muted);font-weight:600;}
  .tl-dot{width:8px;height:8px;border-radius:2px;}

  /* ── GANTT ── */
  .gantt-wrap{position:relative;z-index:1;padding:0 24px 48px;margin-top:20px;}
  .gantt-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;
    overflow:hidden;box-shadow:var(--shadow);}
  .gantt-header{display:flex;align-items:center;justify-content:space-between;
    padding:16px 22px 12px;border-bottom:1.5px solid var(--border);background:var(--bg);}
  .gantt-body{padding:12px 22px 16px;overflow-x:auto;}
  .gantt-body::-webkit-scrollbar{height:4px;}
  .gantt-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

  .gantt-date-row{display:flex;margin-bottom:8px;padding-left:112px;}
  .gantt-date-cell{flex-shrink:0;width:32px;text-align:center;font-family:'Share Tech Mono',monospace;
    font-size:9px;color:var(--locked);font-weight:700;padding:3px 0;}
  .gantt-date-cell.is-today{color:var(--accent);font-weight:900;}
  .gantt-date-cell.is-sun{color:#c8001e;}
  .gantt-date-cell.is-sat{color:#1a56db;}
  .gantt-date-cell.is-selected{background:rgba(200,0,30,0.1);border-radius:4px;color:var(--accent);}

  .gantt-row{display:flex;align-items:center;padding:5px 0;}
  .gantt-row:not(:last-child){border-bottom:1px solid var(--border);}
  .gantt-row-label{width:112px;flex-shrink:0;display:flex;align-items:center;gap:8px;padding-right:10px;}
  .gantt-entity-flag{font-size:20px;line-height:1;}
  .gantt-entity-info{display:flex;flex-direction:column;gap:1px;}
  .gantt-entity-name{font-family:'Share Tech Mono',monospace;font-size:9px;font-weight:700;
    color:var(--text);letter-spacing:1px;}
  .gantt-entity-count{font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--muted);}

  .gantt-cells{display:flex;gap:3px;}
  .gantt-cell{flex-shrink:0;width:32px;height:38px;border-radius:6px;border:1.5px solid var(--border);
    background:var(--bg);cursor:pointer;transition:all .12s;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:2px;position:relative;overflow:visible;}
  .gantt-cell:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(200,0,30,0.2);z-index:10;transform:scaleY(1.06);}
  .gantt-cell.is-today-col{border-color:rgba(200,0,30,0.5);background:rgba(200,0,30,0.06);}
  .gantt-cell.is-selected-col{border-color:var(--accent);border-width:2px;background:rgba(200,0,30,0.08);}
  .gantt-cell.is-weekend{background:#ece8e0;}
  .gantt-ev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .gantt-empty-dot{width:6px;height:6px;border-radius:50%;background:var(--border);}

  .gantt-cell:hover .gantt-tooltip{display:block;}
  .gantt-tooltip{display:none;position:absolute;bottom:calc(100%+8px);left:50%;
    transform:translateX(-50%);background:#1a1612;color:#fff;font-size:10px;
    font-family:'Noto Sans KR',sans-serif;padding:7px 12px;border-radius:8px;
    white-space:nowrap;z-index:999;pointer-events:none;line-height:1.7;
    min-width:90px;text-align:left;box-shadow:0 4px 16px rgba(0,0,0,0.25);}
  .gantt-tooltip::after{content:'';position:absolute;top:100%;left:50%;
    transform:translateX(-50%);border:5px solid transparent;border-top-color:#1a1612;}


  /* ── 수정 팝업 ── */
  .edit-overlay{display:none;position:fixed;inset:0;background:rgba(26,22,18,0.55);
    z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(3px);}
  .edit-overlay.open{display:flex;}
  .edit-popup{background:#fff;border-radius:20px;width:420px;max-width:92vw;
    box-shadow:0 20px 60px rgba(0,0,0,0.25);overflow:hidden;animation:popIn .22s ease;}
  .edit-popup-header{background:#1a1612;padding:18px 22px;display:flex;align-items:center;justify-content:space-between;}
  .edit-popup-title{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-style:italic;
    font-size:20px;color:#fff;letter-spacing:-.3px;}
  .edit-popup-title span{color:var(--accent);}
  .edit-close-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,0.5);
    font-size:18px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    border-radius:50%;transition:background .15s;}
  .edit-close-btn:hover{background:rgba(255,255,255,0.1);color:#fff;}
  .edit-popup-body{padding:20px 22px;}
  .edit-ev-list{display:flex;flex-direction:column;gap:8px;margin-bottom:18px;}
  .edit-ev-item{display:flex;align-items:center;gap:10px;padding:11px 14px;
    background:#f8f5f1;border:1.5px solid #e5ddd4;border-radius:10px;cursor:pointer;
    transition:all .15s;}
  .edit-ev-item:hover{border-color:var(--accent);background:rgba(200,0,30,0.04);}
  .edit-ev-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .edit-ev-info{flex:1;}
  .edit-ev-type{font-size:10px;font-weight:700;color:var(--muted);font-family:'Share Tech Mono',monospace;letter-spacing:1px;}
  .edit-ev-title{font-size:13px;font-weight:700;color:#1a1612;}
  .edit-ev-duty{font-size:11px;color:#5219a8;font-weight:600;}
  .edit-ev-arrow{font-size:14px;color:#c4b8aa;}
  .edit-popup-sub{font-size:11px;color:var(--muted);text-align:center;padding-top:4px;}
  .edit-date-label{font-family:'Share Tech Mono',monospace;font-size:10px;font-weight:700;
    color:var(--muted);letter-spacing:2px;margin-bottom:12px;display:block;}
  .edit-empty{text-align:center;padding:20px;color:var(--locked);font-size:12px;}
  @keyframes popIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

  @media(max-width:1100px){
    .main-wrap{grid-template-columns:1fr;}
    .list-wrap{position:static;}
    .list-body{max-height:360px;}
    .tz-pills{display:none;}
    .months-grid{grid-template-columns:repeat(6,1fr);}
  }
  @media(max-width:600px){
    .topbar{padding:0 14px;}
    .main-wrap,.timeline-wrap,.gantt-wrap{padding:12px 14px 0;}
    .cal-cell{min-height:70px;}
    .months-grid{grid-template-columns:repeat(4,1fr);}
    .gantt-wrap{padding-bottom:40px;}
  }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="home-btn">← MAIN</a>
    <div class="topbar-divider"></div>
    <div class="topbar-logo">
      <span class="red">SME</span> CALENDAR
      <span class="sub">전법인 통합 일정표</span>
    </div>
  </div>
  <div class="tz-pills" id="tzPills"></div>
  <div class="topbar-right">
    <div style="text-align:right;">
      <div class="hq-clock" id="hqClock">--:--:--</div>
      <div class="hq-date" id="hqDate"></div>

    <a href="schedule_input.html" class="add-btn">＋ 일정 등록</a>

</div>

<!-- BADGE BAR -->
<div class="badge-bar" id="badgeBar">
  <span class="badge-bar-label">이달 주요일정</span>
  <span style="font-size:11px;color:var(--locked);">로딩중...</span>
</div>

<!-- MAIN -->
<div class="main-wrap">

  <!-- 달력 -->
  <div class="calendar-wrap" style="animation:fadeUp .4s ease;">
    <div class="cal-nav">
      <button class="cal-nav-btn" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="calMonth"></div>
      <button class="cal-nav-btn" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-filters">
      <span class="cal-filter on" data-f="ALL" onclick="toggleFilter(this)">전체</span>
      <span class="cal-filter" data-f="HQ" onclick="toggleFilter(this)">🏢 HQ</span>
      <span class="cal-filter" data-f="GSMEIN" onclick="toggleFilter(this)">🇮🇳 GSMEIN</span>
      <span class="cal-filter" data-f="SMEGLOBAL" onclick="toggleFilter(this)">🇹🇭 SMEGLOBAL</span>
      <span class="cal-filter" data-f="SMECN" onclick="toggleFilter(this)">🇨🇳 SMECN</span>
    </div>
    <div class="cal-head">
      <div class="cal-head-cell">SUN</div><div class="cal-head-cell">MON</div>
      <div class="cal-head-cell">TUE</div><div class="cal-head-cell">WED</div>
      <div class="cal-head-cell">THU</div><div class="cal-head-cell">FRI</div>
      <div class="cal-head-cell">SAT</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <!-- 우측 패널 -->
  <div class="list-wrap" style="animation:fadeUp .4s ease .1s both;">
    <div class="list-card">
      <div class="week-tabs">
        <div class="week-tab on" data-w="ALL" onclick="switchWeek(this)">전체</div>
        <div class="week-tab" data-w="1" onclick="switchWeek(this)">1주</div>
        <div class="week-tab" data-w="2" onclick="switchWeek(this)">2주</div>
        <div class="week-tab" data-w="3" onclick="switchWeek(this)">3주</div>
        <div class="week-tab" data-w="4" onclick="switchWeek(this)">4주</div>
        <div class="week-tab" data-w="5" onclick="switchWeek(this)">5주</div>
      </div>
      <div class="list-header">
        <div class="list-header-title" id="listTitle">이달 전체</div>
        <div class="list-header-count" id="listCount">0건</div>
      </div>
      <div class="list-body" id="listBody">
        <div class="list-empty">데이터 로딩중...</div>
      </div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:#c8001e;"></div>HQ</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ea6a0a;"></div>인도</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1d4ed8;"></div>태국</div>
        <div class="legend-item"><div class="legend-dot" style="background:#15803d;"></div>중국</div>
        <div class="legend-item"><div class="legend-dot" style="background:#6d28d9;"></div>당직</div>
        <div class="legend-item"><div class="legend-dot" style="background:#b45309;"></div>일정</div>
        <div class="legend-item"><div class="legend-dot" style="background:#1a56db;"></div>마감</div>
      </div>
    </div>
  </div>
</div>

<!-- 간트뷰 -->
<div class="gantt-wrap" style="animation:fadeUp .4s ease .3s both;">
  <div class="gantt-card">
    <div class="gantt-header">
      <div class="section-title">법인별 월간 일정 현황</div>
      <div class="section-year" id="ganttMonthLabel"></div>
    </div>
    <div class="gantt-body">
      <div class="gantt-date-row" id="ganttDateRow"></div>
      <div id="ganttRows"></div>
    </div>
  </div>
</div>

<!-- 연간 타임라인 -->
<div class="timeline-wrap" style="animation:fadeUp .4s ease .2s both;">
  <div class="timeline-card">
    <div class="section-header">
      <div class="section-title">연간 일정 현황</div>
      <div class="section-year" id="timelineYear"></div>
    </div>
    <div class="months-grid" id="monthsGrid"></div>
    <div class="timeline-legend">
      <div class="tl-legend-item"><div class="tl-dot" style="background:#c8001e;"></div>HQ</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#ea6a0a;"></div>인도</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#1d4ed8;"></div>태국</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#15803d;"></div>중국</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#6d28d9;"></div>당직</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#b45309;"></div>일정</div>
      <div class="tl-legend-item"><div class="tl-dot" style="background:#1a56db;"></div>마감</div>
    </div>
  </div>
</div>

<script>
const APPS_URL='https://script.google.com/macros/s/AKfycbxRHuFdQQIDowkSFIV2wAhCHcXdD740pFDD6pZ3qzMx1hkyo_2Lbt39_6AOIYnwbU7TGg/exec';
const MONTHS_EN=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const DAYS_KO=['일','월','화','수','목','금','토'];

let viewYear,viewMonth,allEvents=[],activeFilter='ALL',activeWeek='ALL',selectedDate=null,refreshTimer;

const entityColor={HQ:'hq',GSMEIN:'india',SMEGLOBAL:'thai',SMECN:'china'};
const typeColorMap=e=>{
  if(e.type==='당직')return'duty'; if(e.type==='마감')return'deadline';
  if(e.type==='일정')return'event'; return entityColor[e.entity]||'event';
};
const dotColors={hq:'#c8001e',india:'#ea6a0a',thai:'#1d4ed8',china:'#15803d',duty:'#6d28d9',event:'#b45309',deadline:'#1a56db'};
const entityFlag={HQ:'🏢',GSMEIN:'🇮🇳',SMEGLOBAL:'🇹🇭',SMECN:'🇨🇳'};
const barClass={hq:'bar-hq',india:'bar-india',thai:'bar-thai',china:'bar-china',duty:'bar-duty',event:'bar-event',deadline:'bar-deadline'};

function tzTime(off){const n=new Date();return new Date(n.getTime()+n.getTimezoneOffset()*60000+off*3600000);}
function pad(n){return String(n).padStart(2,'0');}

function updateClocks(){
  const k=tzTime(9);
  document.getElementById('hqClock').textContent=`${pad(k.getHours())}:${pad(k.getMinutes())}:${pad(k.getSeconds())}`;
  document.getElementById('hqDate').textContent=`${k.getFullYear()}.${pad(k.getMonth()+1)}.${pad(k.getDate())} (${DAYS_KO[k.getDay()]})`;
  const fmt=d=>`${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById('tzPills').innerHTML=
    `<div class="tz-pill">🏢 ${fmt(tzTime(9))} <span style="font-size:9px;opacity:.6">KST</span></div>
     <div class="tz-pill">🇮🇳 ${fmt(tzTime(5.5))} <span style="font-size:9px;opacity:.6">IST</span></div>
     <div class="tz-pill">🇹🇭 ${fmt(tzTime(7))} <span style="font-size:9px;opacity:.6">ICT</span></div>
     <div class="tz-pill">🇨🇳 ${fmt(tzTime(8))} <span style="font-size:9px;opacity:.6">CST</span></div>`;
}
setInterval(updateClocks,1000); updateClocks();

function filtered(evs){return activeFilter==='ALL'?evs:evs.filter(e=>e.entity===activeFilter);}
function toggleFilter(el){
  document.querySelectorAll('.cal-filter').forEach(f=>f.classList.remove('on'));
  el.classList.add('on'); activeFilter=el.dataset.f;
  renderCalendar(); renderList();
}
function switchWeek(el){
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); activeWeek=el.dataset.w; renderList();
}
function getWeekOfMonth(ds){
  const d=new Date(ds); const first=new Date(d.getFullYear(),d.getMonth(),1);
  return Math.ceil((d.getDate()+first.getDay())/7);
}
function selectDay(ds){
  selectedDate=ds; activeWeek='ALL';
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('on'));
  document.querySelector('.week-tab[data-w="ALL"]').classList.add('on');
  document.querySelectorAll('.cal-cell').forEach(c=>c.classList.toggle('selected',c.dataset.date===ds));
  const evs=allEvents.filter(e=>e.date===ds);
  const d=new Date(ds);
  document.getElementById('listTitle').textContent=`${d.getMonth()+1}월 ${d.getDate()}일`;
  document.getElementById('listCount').textContent=`${evs.length}건`;
  renderListItems(evs); renderGantt();
  // 일정 있으면 수정 팝업
  if(evs.length>0) openEditPopup(ds,evs);
}

function renderBadgeBar(){
  const kst=tzTime(9);
  const todayStr=`${kst.getFullYear()}-${pad(kst.getMonth()+1)}-${pad(kst.getDate())}`;
  const upcoming=allEvents.filter(e=>e.date>=todayStr).sort((a,b)=>a.date.localeCompare(b.date)).slice(0,12);
  const bar=document.getElementById('badgeBar');
  if(!upcoming.length){bar.innerHTML='<span class="badge-bar-label">이달 주요일정</span><span style="font-size:11px;color:var(--locked);">등록된 일정 없음</span>';return;}
  const bClass=e=>{const c=typeColorMap(e);const m={hq:'hq',india:'india',thai:'thai',china:'china',duty:'duty',event:'event',deadline:'deadline'};return`ev-badge b-${m[c]||'event'}`;};
  const icon=e=>{if(e.type==='당직')return'🟣';if(e.type==='마감')return'🔵';if(e.type==='일정')return'🟡';return entityFlag[e.entity]||'📅';};
  const fmtD=s=>{const p=s.split('-');return`${parseInt(p[1])}/${parseInt(p[2])}`};
  bar.innerHTML='<span class="badge-bar-label">이달 주요일정</span>'+
    upcoming.map(e=>`<span class="${bClass(e)}${e.date===todayStr?' b-today':''}">${icon(e)} ${fmtD(e.date)} ${e.title}${e.duty?' · '+e.duty:''}</span>`).join('');
}

function changeMonth(d){
  viewMonth+=d;
  if(viewMonth>11){viewMonth=0;viewYear++;} if(viewMonth<0){viewMonth=11;viewYear--;}
  selectedDate=null; activeWeek='ALL';
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('on'));
  document.querySelector('.week-tab[data-w="ALL"]').classList.add('on');
  renderCalendar(); renderList(); renderTimeline(); renderGantt();
}

function renderCalendar(){
  const mo=pad(viewMonth+1);
  document.getElementById('calMonth').innerHTML=`<span>${viewYear}</span>.${mo}`;
  const first=new Date(viewYear,viewMonth,1); const last=new Date(viewYear,viewMonth+1,0);
  const startDay=first.getDay();
  const kst=tzTime(9); const todayStr=`${kst.getFullYear()}-${pad(kst.getMonth()+1)}-${pad(kst.getDate())}`;
  const evMap={};
  filtered(allEvents).forEach(e=>{(evMap[e.date]=evMap[e.date]||[]).push(e);});
  let html='';
  for(let i=0;i<startDay;i++){
    const d=new Date(viewYear,viewMonth,1-startDay+i);
    html+=`<div class="cal-cell other-month"><span class="cal-date">${d.getDate()}</span></div>`;
  }
  for(let d=1;d<=last.getDate();d++){
    const ds=`${viewYear}-${mo}-${pad(d)}`;
    const dow=(startDay+d-1)%7;
    let cls=`cal-cell${ds===todayStr?' today':''}${dow===0?' sunday':dow===6?' saturday':''}${selectedDate===ds?' selected':''}`;
    const evs=evMap[ds]||[]; const show=evs.slice(0,3); const more=evs.length-3;
    const evHtml=show.map(e=>{
      const c=typeColorMap(e);
      const lbl=e.type==='당직'?`🟣 ${e.duty||e.title}`:e.title;
      return `<div class="cell-event ev-${c}">${lbl}</div>`;
    }).join('');
    html+=`<div class="${cls}" data-date="${ds}" onclick="selectDay('${ds}')">
      <span class="cal-date">${d}</span>
      <div class="cell-events">${evHtml}${more>0?`<div class="cell-more">+${more}</div>`:''}</div>
    </div>`;
  }
  const rem=(7-((startDay+last.getDate())%7))%7;
  for(let i=1;i<=rem;i++) html+=`<div class="cal-cell other-month"><span class="cal-date">${i}</span></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

function renderList(){
  const mo=pad(viewMonth+1); const prefix=`${viewYear}-${mo}`;
  const kst=tzTime(9); const todayStr=`${kst.getFullYear()}-${pad(kst.getMonth()+1)}-${pad(kst.getDate())}`;
  let evs=filtered(allEvents).filter(e=>e.date.startsWith(prefix));
  if(activeWeek!=='ALL') evs=evs.filter(e=>getWeekOfMonth(e.date)===parseInt(activeWeek));
  evs.sort((a,b)=>a.date.localeCompare(b.date));
  const wLabel=activeWeek==='ALL'?`${viewYear}년 ${viewMonth+1}월 전체`:`${viewYear}년 ${viewMonth+1}월 ${activeWeek}주차`;
  document.getElementById('listTitle').textContent=wLabel;
  document.getElementById('listCount').textContent=`${evs.length}건`;
  renderListItems(evs,todayStr);
}

function renderListItems(evs,todayStr){
  const body=document.getElementById('listBody');
  if(!evs.length){body.innerHTML='<div class="list-empty">등록된 일정이 없습니다</div>';return;}
  let html='';
  evs.forEach(e=>{
    const parts=e.date.split('-');
    const dc=dotColors[typeColorMap(e)]||'#aaa';
    const past=todayStr&&e.date<todayStr?' past':'';
    const active=selectedDate===e.date?' is-active':'';
    html+=`<div class="list-item${past}${active}" onclick="selectDay('${e.date}')">
      <div class="list-date-block">
        <div class="list-date-d">${parseInt(parts[2])}</div>
        <div class="list-date-m">${MONTHS_EN[parseInt(parts[1])-1]}</div>
      </div>
      <div class="list-dot" style="background:${dc};"></div>
      <div class="list-info">
        <div class="list-meta">
          <span class="list-flag">${entityFlag[e.entity]||''}</span>
          <span class="list-ename">${e.entity}</span>
          <span class="list-type">${e.type}</span>
        </div>
        <div class="list-title">${e.title}</div>
        ${e.duty?`<div class="list-duty-tag">당직 · ${e.duty}</div>`:''}
        ${e.note?`<div class="list-note">${e.note}</div>`:''}
      </div>
    </div>`;
  });
  body.innerHTML=html;
}

function renderTimeline(){
  document.getElementById('timelineYear').innerHTML=`<span>${viewYear}</span>년`;
  const kst=tzTime(9);
  const currentMo=kst.getMonth();
  let html='';
  for(let m=0;m<12;m++){
    const mo=pad(m+1); const prefix=`${viewYear}-${mo}`;
    const evs=allEvents.filter(e=>e.date.startsWith(prefix));
    const total=evs.length;
    const isCurrent=(viewYear===kst.getFullYear()&&m===currentMo);
    const isSelected=(m===viewMonth);
    const counts={hq:0,india:0,thai:0,china:0,duty:0,event:0,deadline:0};
    evs.forEach(e=>{const c=typeColorMap(e);if(counts[c]!==undefined)counts[c]++;});
    const maxCount=Math.max(...Object.values(counts),1);
    const segs=Object.entries(counts).filter(([,v])=>v>0).map(([k,v])=>{
      const h=Math.max(3,Math.round((v/maxCount)*36));
      return `<div class="bar-seg ${barClass[k]}" style="height:${h}px;"></div>`;
    }).join('');
    const weekHas={1:false,2:false,3:false,4:false,5:false};
    evs.forEach(e=>{const w=getWeekOfMonth(e.date);if(weekHas[w]!==undefined)weekHas[w]=true;});
    const weekDots=[1,2,3,4,5].map(w=>`<div class="week-dot${weekHas[w]?' has-ev':''}"></div>`).join('');
    html+=`<div class="month-col${isCurrent?' current-month':''}${isSelected?' selected-month':''}" onclick="goToMonth(${m})">
      <div class="month-label">${MONTHS_EN[m]}</div>
      <div class="month-bar-wrap"><div class="month-bar-stack">${segs||'<div style="height:3px;background:var(--border);border-radius:2px;"></div>'}</div></div>
      <div class="month-count${total===0?' zero':''}">${total>0?total:'-'}</div>
      <div class="month-weeks">${weekDots}</div>
    </div>`;
  }
  document.getElementById('monthsGrid').innerHTML=html;
}

function renderGantt(){
  const mo=pad(viewMonth+1);
  const lastDay=new Date(viewYear,viewMonth+1,0).getDate();
  const kst=tzTime(9);
  const todayStr=`${kst.getFullYear()}-${pad(kst.getMonth()+1)}-${pad(kst.getDate())}`;
  document.getElementById('ganttMonthLabel').innerHTML=`<span>${viewYear}</span>년 ${viewMonth+1}월`;
  let dateRowHtml='';
  for(let d=1;d<=lastDay;d++){
    const ds=`${viewYear}-${mo}-${pad(d)}`;
    const dow=new Date(ds).getDay();
    let cls='gantt-date-cell';
    if(ds===todayStr) cls+=' is-today';
    else if(dow===0) cls+=' is-sun';
    else if(dow===6) cls+=' is-sat';
    if(ds===selectedDate) cls+=' is-selected';
    dateRowHtml+=`<div class="${cls}">${d}</div>`;
  }
  document.getElementById('ganttDateRow').innerHTML=dateRowHtml;
  const entities=[
    {code:'HQ',flag:'🏢',name:'HQ'},
    {code:'GSMEIN',flag:'🇮🇳',name:'GSMEIN'},
    {code:'SMEGLOBAL',flag:'🇹🇭',name:'SMEGLOBAL'},
    {code:'SMECN',flag:'🇨🇳',name:'SMECN'},
  ];
  let rowsHtml='';
  entities.forEach(ent=>{
    const rowEvs=allEvents.filter(e=>e.entity===ent.code&&e.date.startsWith(`${viewYear}-${mo}`));
    const evByDate={};
    rowEvs.forEach(e=>{(evByDate[e.date]=evByDate[e.date]||[]).push(e);});
    let cellsHtml='';
    for(let d=1;d<=lastDay;d++){
      const ds=`${viewYear}-${mo}-${pad(d)}`;
      const dow=new Date(ds).getDay();
      const evs=evByDate[ds]||[];
      let cls='gantt-cell';
      if(ds===todayStr) cls+=' is-today-col';
      if(ds===selectedDate) cls+=' is-selected-col';
      if(dow===0||dow===6) cls+=' is-weekend';
      let inner='';
      if(evs.length>0){
        inner=evs.slice(0,3).map(e=>`<div class="gantt-ev-dot" style="background:${dotColors[typeColorMap(e)]};"></div>`).join('');
        const tipLines=evs.map(e=>`${e.type==='당직'?'🟣':e.type==='마감'?'🔵':e.type==='일정'?'🟡':'🔴'} ${e.title}${e.duty?' · '+e.duty:''}`).join('<br>');
        inner+=`<div class="gantt-tooltip">${tipLines}</div>`;
      } else {
        inner=`<div class="gantt-empty-dot"></div>`;
      }
      cellsHtml+=`<div class="${cls}" onclick="selectDay('${ds}')">${inner}</div>`;
    }
    rowsHtml+=`<div class="gantt-row">
      <div class="gantt-row-label">
        <span class="gantt-entity-flag">${ent.flag}</span>
        <div class="gantt-entity-info">
          <span class="gantt-entity-name">${ent.name}</span>
          <span class="gantt-entity-count">${rowEvs.length}건</span>
        </div>
      </div>
      <div class="gantt-cells">${cellsHtml}</div>
    </div>`;
  });
  document.getElementById('ganttRows').innerHTML=rowsHtml;
}

function goToMonth(m){
  viewMonth=m; selectedDate=null; activeWeek='ALL';
  document.querySelectorAll('.week-tab').forEach(t=>t.classList.remove('on'));
  document.querySelector('.week-tab[data-w="ALL"]').classList.add('on');
  renderCalendar(); renderList(); renderTimeline(); renderGantt();
}


/* ── 수정 팝업 ── */
let _editEvCache = []; // 전역 캐시 — JSON 직렬화 우회

function openEditPopup(ds, evs){
  _editEvCache = evs; // 전역에 저장
  const d = new Date(ds);
  const DK = ['일','월','화','수','목','금','토'];
  document.getElementById('editDateLabel').textContent =
    `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 (${DK[d.getDay()]})`;

  const dc = {hq:'#c8001e',india:'#ea6a0a',thai:'#1d4ed8',china:'#15803d',
    duty:'#6d28d9',event:'#b45309',deadline:'#1a56db'};

  document.getElementById('editEvList').innerHTML = evs.map((e,i) => {
    const c = typeColorMap(e);
    const icon = e.type==='당직'?'🟣':e.type==='마감'?'🔵':e.type==='일정'?'🟡':e.type==='기타'?'🔘':'🔴';
    return `<div class="edit-ev-item" onclick="goToEdit(${i})">
      <div class="edit-ev-dot" style="background:${dc[c]||'#aaa'};"></div>
      <div class="edit-ev-info">
        <div class="edit-ev-type">${entityFlag[e.entity]||''} ${e.entity} · ${e.type}</div>
        <div class="edit-ev-title">${icon} ${e.title}</div>
        ${e.duty?`<div class="edit-ev-duty">당직 · ${e.duty}</div>`:''}
      </div>
      <div class="edit-ev-arrow">→</div>
    </div>`;
  }).join('') || '<div class="edit-empty">일정이 없습니다</div>';

  document.getElementById('editOverlay').classList.add('open');
}

function closeEditPopup(e){
  if(e.target===document.getElementById('editOverlay')) closeEditPopupDirect();
}
function closeEditPopupDirect(){
  document.getElementById('editOverlay').classList.remove('open');
}

function goToEdit(idx){
  try{
    const d = _editEvCache[idx];
    if(!d) return;
    const encoded = encodeURIComponent(JSON.stringify(d));
    window.location.href = `schedule_input.html?mode=edit&data=${encoded}`;
  }catch(e){ console.error('goToEdit error:', e); }
}

async function loadEvents(){
  try{
    const res=await fetch(`${APPS_URL}?action=schedule_list&all=1`);
    allEvents=await res.json();
  }catch(e){allEvents=[];}
  renderBadgeBar(); renderCalendar(); renderList(); renderTimeline(); renderGantt();
  const kst=tzTime(9);
  document.getElementById('refreshTag').textContent=`갱신 ${pad(kst.getHours())}:${pad(kst.getMinutes())}:${pad(kst.getSeconds())}`;
}

const initKST=tzTime(9);
viewYear=initKST.getFullYear(); viewMonth=initKST.getMonth();
loadEvents();
clearInterval(refreshTimer);
refreshTimer=setInterval(loadEvents,30000);
</script>

<!-- 수정 팝업 -->
<div class="edit-overlay" id="editOverlay" onclick="closeEditPopup(event)">
  <div class="edit-popup">
    <div class="edit-popup-header">
      <div class="edit-popup-title"><span>SME</span> CALENDAR</div>
      <button class="edit-close-btn" onclick="closeEditPopupDirect()">✕</button>
    </div>
    <div class="edit-popup-body">
      <span class="edit-date-label" id="editDateLabel"></span>
      <div class="edit-ev-list" id="editEvList"></div>
      <div class="edit-popup-sub">수정할 일정을 선택하세요</div>
    </div>
  </div>
</div>
</body>
